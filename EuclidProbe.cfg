[include EuclidUtilities.cfg]

[probe]
deactivate_on_each_sample: False
samples_result: average
samples_tolerance: 0.25
speed: 12
x_offset: -4
y_offset: 19
# NOTE: this z_offset sign looks inverted (Euclid trigger point is ~8.5mm
# BELOW the nozzle, which is conventionally a POSITIVE z_offset). It only
# works here because bed_mesh uses zero_reference_position, making meshes
# relative. Probe-based Z homing (HOME_Z_WITH_PROBE) deliberately ignores
# this value and uses the per-unit calibrated probe_trigger_height from
# variables.cfg instead (CALIBRATE_PROBE_TRIGGER_HEIGHT). Revisit the sign
# before using this value for anything absolute.
z_offset: -8.5
activate_gcode: