[include EuclidUtilities.cfg]

[probe]
deactivate_on_each_sample: False
samples_result: average
samples_tolerance: 0.25
speed: 12
x_offset: -4
y_offset: 19
# CRITICAL: Z homes via probe:z_virtual_endstop, so z_offset DEFINES Z=0
# (the nozzle-to-bed distance when the probe triggers). It MUST be positive
# for an under-slung Euclid (trigger point ~8.5mm below the nozzle). The
# old value here was -8.5 (sign inverted) — harmless when meshing was
# relative, but catastrophic as a homing reference (everything 17mm off).
# Calibrate per unit: probe attached -> PROBE_CALIBRATE -> paper test ->
# SAVE_CONFIG (the per-unit override lands in printer.cfg's SAVE_CONFIG
# block and wins over this baseline).
z_offset: 8.5
activate_gcode: