############################################################
### EUCLID/KLICKY PROBE — THE Z REFERENCE ###
############################################################
# ARCHITECTURE: the probe is the ONLY Z reference on this machine.
# [stepper_z] endstop_pin is probe:z_virtual_endstop (HC32F460.cfg); the old
# gantry Z switches (PC15/PC14) are repurposed as filament runout sensors
# (filamentsensors.cfg). Consequences:
#   - Homing Z REQUIRES the probe attached (guarded G28 below)
#   - [probe] z_offset (EuclidProbe.cfg) defines Z=0 — calibrate per unit
#     with PROBE_CALIBRATE + SAVE_CONFIG
#   - Printing still requires the probe REMOVED (ASSERT_PROBE_DOCKED)
#
# IMPORTANT Klipper gotcha: a macro's template is fully rendered BEFORE any
# of its commands execute, so QUERY_PROBE + reading probe.last_query in the
# SAME macro sees the PREVIOUS query's value. Checks therefore live in a
# second macro, whose template renders only after QUERY_PROBE has run.
#
# Probe polarity (NC wiring — see base/HC32F460.cfg):
#   attached idle = open (last_query False) | detached/pressed = TRIGGERED (True)

############################################################
### PROBE-ATTACHED GUARDS ###
############################################################
# If BED_MESH_CALIBRATE or SCREWS_TILT_CALCULATE runs while the probe is
# docked, the switch can never trigger and the nozzle is driven into the bed
# (down to position_min) before Klipper errors.

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE_BASE
description: Bed mesh calibrate, guarded — refuses to run without the probe attached
gcode:
    # Homed pre-check lives HERE (outermost level, render time) so the error
    # echoes exactly once. Klipper re-reports an error at every macro nesting
    # level as it unwinds - letting the base command fail deep in the guard
    # chain prints "Must home axis first" three times.
    {% if printer.toolhead.homed_axes != "xyz" %}
        { action_raise_error("Must home first: attach the probe, run G28, then retry BED_MESH_CALIBRATE") }
    {% endif %}
    QUERY_PROBE
    _GUARDED_MESH_CALIBRATE {rawparams}

[gcode_macro _GUARDED_MESH_CALIBRATE]
gcode:
    {% if printer.probe.last_query %}
        _SAFETY_STOP MSG="PROBE GUARD: bed mesh blocked - probe not attached" DETAIL="Probe not attached (reads TRIGGERED = detached, pressed, or wiring fault). Attach the Euclid probe (or run PROBE_PICKUP) before bed mesh calibration."
    {% endif %}
    _BED_MESH_CALIBRATE_BASE {rawparams}

[gcode_macro SCREWS_TILT_CALCULATE]
rename_existing: _SCREWS_TILT_CALCULATE_BASE
description: Screws tilt calculate, guarded — refuses to run without the probe attached
gcode:
    # Single-echo homed pre-check - see BED_MESH_CALIBRATE comment above.
    {% if printer.toolhead.homed_axes != "xyz" %}
        { action_raise_error("Must home first: attach the probe, run G28, then retry SCREWS_TILT_CALCULATE") }
    {% endif %}
    QUERY_PROBE
    _GUARDED_SCREWS_TILT {rawparams}

[gcode_macro _GUARDED_SCREWS_TILT]
gcode:
    {% if printer.probe.last_query %}
        _SAFETY_STOP MSG="PROBE GUARD: screws tilt blocked - probe not attached" DETAIL="Probe not attached (reads TRIGGERED = detached, pressed, or wiring fault). Attach the Euclid probe (or run PROBE_PICKUP) before screws tilt calculation."
    {% endif %}
    _SCREWS_TILT_CALCULATE_BASE {rawparams}

############################################################
### GUARDED HOMING ###
############################################################
# Z homes by probing (probe:z_virtual_endstop + [safe_z_home]), so any
# Z-inclusive G28 REQUIRES the probe attached — without it the switch can
# never trigger. X/Y homing never needs the probe and is always allowed.
# NOTE: G28 takes G-style bare axis letters (G28 X), but macro-style commands
# only accept KEY=VALUE params — bare text forwarded to a helper is rejected
# as "Malformed command". Axis parsing happens HERE at render time; the
# probe-state check (needs a fresh QUERY_PROBE) lives in _Z_HOME_ROUTER,
# receiving the axes as a quoted AXES="..." value.
# NAMING: Klipper's dispatcher only allows digits at the END of a command
# name (e.g. _G28_Z_ROUTER would dispatch as unknown command "_G28").
[gcode_macro G28]
rename_existing: G28.1
description: Home axes — Z homes via the probe and requires it attached
gcode:
    {% set raw = rawparams|upper %}
    # Bare G28 (no axis letters) homes ALL axes, including Z.
    {% set homes_z = ('Z' in raw) or ('X' not in raw and 'Y' not in raw) %}
    {% if homes_z %}
        # Position the toolhead over the bed BEFORE querying the probe. The
        # Euclid probe seats from the dock as the carriage moves, so querying
        # it at the power-on/park position (the old order) often read "detached"
        # and aborted the home. Home X/Y (only if needed), traverse to the
        # safe_z_home probe point to settle the probe over the bed, THEN query.
        {% if 'x' not in printer.toolhead.homed_axes %}
            G28.1 X
        {% endif %}
        {% if 'y' not in printer.toolhead.homed_axes %}
            G28.1 Y
        {% endif %}
        {% if 'z' in printer.toolhead.homed_axes %}
            # Z already homed — lift to clear the bed before traversing.
            G91
            G1 Z15 F300
            G90
        {% endif %}
        {% set xy = printer.configfile.settings.safe_z_home.home_xy_position %}
        G90
        G1 X{xy[0]} Y{xy[1]} F3900
        QUERY_PROBE
        _Z_HOME_ROUTER AXES="Z"
    {% else %}
        G28.1 {rawparams}
    {% endif %}

[gcode_macro _Z_HOME_ROUTER]
description: Internal — allow Z homing only with the probe attached (after fresh QUERY_PROBE)
gcode:
    {% if not printer.probe.last_query %}
        # Probe attached — Z homes by probing at the safe_z_home position.
        G28.1 {params.AXES|default("")}
    {% else %}
        _SAFETY_STOP MSG="PROBE GUARD: Z homing needs the probe attached" DETAIL="Z homes via the probe on this machine. Attach the Euclid probe (or run PROBE_PICKUP if the dock is calibrated), then home again. X/Y can home without it (G28 X Y)."
    {% endif %}

############################################################
### PROBE DOCK MOVES ###
############################################################
# NOTE: with probe-based Z homing, an UNHOMED machine must have the probe
# attached MANUALLY for its first G28 — the dock can only be used once the
# machine is homed (dock moves need a valid Z).

#home printer and equip probe
[gcode_macro PROBE_PICKUP]
gcode:
  {% set xpos = printer["gcode_macro LNLOS"].probe_pickup_xpos|float %}
  {% set ypos = printer["gcode_macro LNLOS"].probe_pickup_ypos|float %}
  {% set zpos = printer["gcode_macro LNLOS"].probe_pickup_zpos|float %}
  {% set zraise = printer["gcode_macro LNLOS"].probe_pickup_zraise|float %}
  # Safety: abort if the dock position was never calibrated (all zeros) —
  # driving to (0,0,0) would crash the probe/nozzle into the bed corner.
  {% if xpos == 0 and ypos == 0 and zpos == 0 %}
    _SAFETY_STOP MSG="PROBE GUARD: dock not calibrated" DETAIL="Probe dock position not calibrated. Set probe_pickup_x/y/zpos in the LNLOS macro before using the probe dock."
  {% endif %}
  HOME_IF_NOT
  G1 Z{zraise} F1050
  G1 X{xpos} Y{ypos} F12000
  G1 Z{zpos} F1050
  # Lift away from the dock, then re-home X/Y ONLY (Z remains homed; with
  # the probe now attached a Z re-home is possible but unnecessary).
  G1 Z{zraise} F1050
  G28 X
  G28 Y
  PROBEON

#home printer and drop probe off at dock
[gcode_macro PROBE_DROPOFF]
gcode:
  {% set xpos = printer["gcode_macro LNLOS"].probe_pickup_xpos|float %}
  {% set xposrel = xpos+10 %}
  {% set ypos = printer["gcode_macro LNLOS"].probe_pickup_ypos|float %}
  {% set zpos = printer["gcode_macro LNLOS"].probe_pickup_zpos|float %}
  {% set zraise = printer["gcode_macro LNLOS"].probe_pickup_zraise|float %}
  # Safety: abort if the dock position was never calibrated (all zeros).
  {% if xpos == 0 and ypos == 0 and zpos == 0 %}
    _SAFETY_STOP MSG="PROBE GUARD: dock not calibrated" DETAIL="Probe dock position not calibrated. Set probe_pickup_x/y/zpos in the LNLOS macro before using the probe dock."
  {% endif %}
  HOME_IF_NOT
  G1 Z{zraise} F1050
  G1 Y{ypos} F12000
  G1 X{xpos} F2500
  G1 Z{zpos} F1050
  G1 X{xposrel} F1250
  G1 Z{zraise} F1050
  # Re-home X/Y only — the probe is now DOCKED, so Z homing is impossible
  # (and unnecessary: Z stays homed from before the dock moves).
  G28 X
  G28 Y
  PROBEOFF

[gcode_macro _Prepare_BedMesh]
gcode:
  PROBE_PICKUP
  BED_MESH_CALIBRATE
  PROBE_DROPOFF

#equip probe, run screws tilt, remove probe
#end goal will be to equip probe, heat up bed, run screws tilt til acceptable, run mesh, drop off probe, also registering probeon=1/0
[gcode_macro _AUTO_PROBE]
gcode:
  PROBE_PICKUP
  SCREWS_TILT_CALCULATE
  PROBE_DROPOFF
