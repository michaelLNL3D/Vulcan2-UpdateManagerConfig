

############################################################
### PROBE-ATTACHED GUARDS ###
############################################################
# The Euclid probe is detachable: if BED_MESH_CALIBRATE or
# SCREWS_TILT_CALCULATE runs while the probe is docked, the switch can never
# trigger and the nozzle is driven into the bed (down to position_min) before
# Klipper errors. These wrappers re-verify the probe is attached first.
#
# IMPORTANT Klipper gotcha: a macro's template is fully rendered BEFORE any
# of its commands execute, so QUERY_PROBE + reading probe.last_query in the
# SAME macro sees the PREVIOUS query's value. The check therefore lives in a
# second macro, whose template renders only after QUERY_PROBE has run.
#
# Probe polarity (NC wiring — see base/HC32F460.cfg):
#   attached idle = open (last_query False) | detached/pressed = TRIGGERED (True)

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE_BASE
description: Bed mesh calibrate, guarded — refuses to run without the probe attached
gcode:
    QUERY_PROBE
    _GUARDED_MESH_CALIBRATE {rawparams}

[gcode_macro _GUARDED_MESH_CALIBRATE]
gcode:
    {% if printer.probe.last_query %}
        RESPOND TYPE=error MSG="SAFETY STOP: Probe not attached (reads TRIGGERED = detached, pressed, or wiring fault). Attach the Euclid probe (or run PROBE_PICKUP) before bed mesh calibration."
        _SAFETY_STOP PROBE GUARD: bed mesh blocked - probe not attached
    {% endif %}
    _BED_MESH_CALIBRATE_BASE {rawparams}

[gcode_macro SCREWS_TILT_CALCULATE]
rename_existing: _SCREWS_TILT_CALCULATE_BASE
description: Screws tilt calculate, guarded — refuses to run without the probe attached
gcode:
    QUERY_PROBE
    _GUARDED_SCREWS_TILT {rawparams}

# --- Z-homing guard: the INVERSE protection ---------------------------------
# The Euclid probe body hangs BELOW the nozzle, so homing Z with the probe
# attached crashes the probe into the bed before the physical Z endstop
# (PC15) can trigger. Block any G28 that includes Z (bare G28 homes all
# axes) while the probe reads attached. X/Y homing stays allowed so the
# carriage can always be recovered with the probe on.
# NOTE: G28 takes G-style bare axis letters (G28 X), but macro-style commands
# only accept KEY=VALUE params — forwarding {rawparams} to a helper macro
# would be rejected as "Malformed command". So the axis parsing happens HERE
# at render time (rawparams is available then), and only the probe-state
# check — which must render AFTER QUERY_PROBE — lives in the parameterless
# helper below.
[gcode_macro G28]
rename_existing: G28.1
description: Home axes, guarded — refuses to home Z while the Euclid probe is attached
gcode:
    {% set raw = rawparams|upper %}
    # Bare G28 (no axis letters) homes ALL axes, including Z.
    {% set homes_z = ('Z' in raw) or ('X' not in raw and 'Y' not in raw) %}
    {% if homes_z %}
        QUERY_PROBE
        _ASSERT_PROBE_DOCKED_FOR_Z
    {% endif %}
    G28.1 {rawparams}

[gcode_macro _ASSERT_PROBE_DOCKED_FOR_Z]
description: Internal — halt if the probe reads attached (called after a fresh QUERY_PROBE)
gcode:
    {% if not printer.probe.last_query %}
        RESPOND TYPE=error MSG="SAFETY STOP: Probe is attached - homing Z would crash it into the bed. Dock the probe first (PROBE_DROPOFF), or home X/Y only (G28 X Y)."
        _SAFETY_STOP PROBE GUARD: Z homing blocked - probe attached
    {% endif %}

[gcode_macro _GUARDED_SCREWS_TILT]
gcode:
    {% if printer.probe.last_query %}
        RESPOND TYPE=error MSG="SAFETY STOP: Probe not attached (reads TRIGGERED = detached, pressed, or wiring fault). Attach the Euclid probe (or run PROBE_PICKUP) before screws tilt calculation."
        _SAFETY_STOP PROBE GUARD: screws tilt blocked - probe not attached
    {% endif %}
    _SCREWS_TILT_CALCULATE_BASE {rawparams}

#home printer and equip probe
[gcode_macro PROBE_PICKUP]
gcode:
  {% set xpos = printer["gcode_macro LNLOS"].probe_pickup_xpos|float %}
  {% set ypos = printer["gcode_macro LNLOS"].probe_pickup_ypos|float %}
  {% set zpos = printer["gcode_macro LNLOS"].probe_pickup_zpos|float %}
  {% set zraise = printer["gcode_macro LNLOS"].probe_pickup_zraise|float %}
  # Safety: abort if the dock position was never calibrated (all zeros) —
  # driving to (0,0,0) would crash the probe/nozzle into the bed corner.
  {% if xpos == 0 and ypos == 0 and zpos == 0 %}
    RESPOND TYPE=error MSG="SAFETY STOP: Probe dock position not calibrated. Set probe_pickup_x/y/zpos in the LNLOS macro before using the probe dock."
    _SAFETY_STOP PROBE GUARD: dock not calibrated
  {% endif %}
  HOME_IF_NOT
  G1 Z{zraise} F1050
  G1 X{xpos} Y{ypos} F12000
  G1 Z{zpos} F1050
  # Lift away from the dock, then re-home X/Y ONLY — homing Z with the
  # probe attached would crash it into the bed (also blocked by the G28
  # guard below). Z remains homed from HOME_IF_NOT above.
  G1 Z{zraise} F1050
  G28 X
  G28 Y
  PROBEON



#home printer and drop probe off at dock
[gcode_macro PROBE_DROPOFF]
gcode:
  {% set xpos = printer["gcode_macro LNLOS"].probe_pickup_xpos|float %}
  {% set xposrel = xpos+10 %}
  {% set ypos = printer["gcode_macro LNLOS"].probe_pickup_ypos|float %}
  {% set zpos = printer["gcode_macro LNLOS"].probe_pickup_zpos|float %}
  {% set zraise = printer["gcode_macro LNLOS"].probe_pickup_zraise|float %}
  # Safety: abort if the dock position was never calibrated (all zeros).
  {% if xpos == 0 and ypos == 0 and zpos == 0 %}
    RESPOND TYPE=error MSG="SAFETY STOP: Probe dock position not calibrated. Set probe_pickup_x/y/zpos in the LNLOS macro before using the probe dock."
    _SAFETY_STOP PROBE GUARD: dock not calibrated
  {% endif %}
  HOME_IF_NOT
  G1 Z{zraise} F1050
  G1 Y{ypos} F12000
  G1 X{xpos} F2500
  G1 Z{zpos} F1050
  G1 X{xposrel} F1250
  G1 Z{zraise} F1050
  G28 X
  G28 Y Z
  PROBEOFF

[gcode_macro _Prepare_BedMesh]
gcode:
  PROBE_PICKUP
  BED_MESH_CALIBRATE
  PROBE_DROPOFF

#equip probe, run screws tilt, remove probe
#end goal will be to equip probe, heat up bed, run screws tilt til acceptable, run mesh, drop off probe, also registering probeon=1/0
[gcode_macro _AUTO_PROBE]
gcode:
  PROBE_PICKUP
  SCREWS_TILT_CALCULATE
  PROBE_DROPOFF