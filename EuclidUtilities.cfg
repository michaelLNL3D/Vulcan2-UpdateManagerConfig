

############################################################
### PROBE-ATTACHED GUARDS ###
############################################################
# The Euclid probe is detachable: if BED_MESH_CALIBRATE or
# SCREWS_TILT_CALCULATE runs while the probe is docked, the switch can never
# trigger and the nozzle is driven into the bed (down to position_min) before
# Klipper errors. These wrappers re-verify the probe is attached first.
#
# IMPORTANT Klipper gotcha: a macro's template is fully rendered BEFORE any
# of its commands execute, so QUERY_PROBE + reading probe.last_query in the
# SAME macro sees the PREVIOUS query's value. The check therefore lives in a
# second macro, whose template renders only after QUERY_PROBE has run.
#
# Probe polarity (NC wiring — see base/HC32F460.cfg):
#   attached idle = open (last_query False) | detached/pressed = TRIGGERED (True)

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE_BASE
description: Bed mesh calibrate, guarded — refuses to run without the probe attached
gcode:
    QUERY_PROBE
    _GUARDED_MESH_CALIBRATE {rawparams}

[gcode_macro _GUARDED_MESH_CALIBRATE]
gcode:
    {% if printer.probe.last_query %}
        _SAFETY_STOP MSG="PROBE GUARD: bed mesh blocked - probe not attached" DETAIL="Probe not attached (reads TRIGGERED = detached, pressed, or wiring fault). Attach the Euclid probe (or run PROBE_PICKUP) before bed mesh calibration."
    {% endif %}
    _BED_MESH_CALIBRATE_BASE {rawparams}

[gcode_macro SCREWS_TILT_CALCULATE]
rename_existing: _SCREWS_TILT_CALCULATE_BASE
description: Screws tilt calculate, guarded — refuses to run without the probe attached
gcode:
    QUERY_PROBE
    _GUARDED_SCREWS_TILT {rawparams}

# --- Hybrid Z homing ----------------------------------------------------------
# The Euclid probe body hangs BELOW the nozzle, so homing Z on the physical
# gantry endstop (PC15) with the probe attached would crash the probe into
# the bed. Z-inclusive G28 therefore ROUTES on probe state:
#   probe docked   -> normal endstop homing (G28.1)
#   probe attached -> HOME_Z_WITH_PROBE (probe-based Z reference; requires
#                     one-time CALIBRATE_PROBE_TRIGGER_HEIGHT, else refuses)
# Probe-homed Z is a CONVENIENCE reference for mesh/calibration workflows —
# PRINT_START flows still home on the endstop (probe docked) so prints use
# one consistent Z reference.
# NOTE: G28 takes G-style bare axis letters (G28 X), but macro-style commands
# only accept KEY=VALUE params — bare text forwarded to a helper is rejected
# as "Malformed command". Axis parsing happens HERE at render time; the
# probe-state routing (needs a fresh QUERY_PROBE) lives in _Z_HOME_ROUTER,
# receiving the axes as a quoted AXES="..." value.
# NAMING: Klipper's dispatcher only allows digits at the END of a command
# name — a name like _G28_Z_ROUTER is parsed as command "_G28" + leftover
# text ("Unknown command"). Hence the digit-free helper name.
[gcode_macro G28]
rename_existing: G28.1
description: Home axes — Z routes to the probe when attached, gantry endstop when docked
gcode:
    {% set raw = rawparams|upper %}
    # Bare G28 (no axis letters) homes ALL axes, including Z.
    {% set homes_z = ('Z' in raw) or ('X' not in raw and 'Y' not in raw) %}
    {% if homes_z %}
        QUERY_PROBE
        _Z_HOME_ROUTER AXES="{raw|trim}"
    {% else %}
        G28.1 {rawparams}
    {% endif %}

[gcode_macro _Z_HOME_ROUTER]
description: Internal — route Z-inclusive homing by probe state (called after a fresh QUERY_PROBE)
gcode:
    {% if printer.probe.last_query %}
        # Probe docked — normal endstop homing.
        G28.1 {params.AXES|default("")}
    {% else %}
        # Announcement happens inside _HZWP_STAGE2, AFTER the calibration
        # precondition passes — announcing here would promise an action that
        # the calibration check may then refuse.
        HOME_Z_WITH_PROBE
    {% endif %}

# --- Probe-based Z homing ------------------------------------------------------
# Establishes the Z reference by probing the bed center: fake-home Z high
# (so the descent has full safe range), slow PROBE, then declare the true Z
# from the calibrated nozzle-to-trigger height. Deliberately does NOT use
# [probe] z_offset (its sign is only valid for relative meshing here).
[gcode_macro HOME_Z_WITH_PROBE]
description: Home Z using the attached Euclid probe (requires CALIBRATE_PROBE_TRIGGER_HEIGHT once)
gcode:
    QUERY_PROBE
    _HZWP_STAGE2

[gcode_macro _HZWP_STAGE2]
description: Internal — verify preconditions then probe-home Z
gcode:
    {% if printer.probe.last_query %}
        _SAFETY_STOP MSG="PROBE GUARD: probe Z-homing requires the probe attached" DETAIL="Probe not attached - HOME_Z_WITH_PROBE needs the probe on the carriage. Probe docked? Just run G28."
    {% endif %}
    {% set h = printer.save_variables.variables.probe_trigger_height|default(0)|float %}
    {% if h <= 0 %}
        _SAFETY_STOP MSG="PROBE GUARD: run CALIBRATE_PROBE_TRIGGER_HEIGHT first" DETAIL="Probe trigger height not calibrated on this unit. Dock the probe, G28, attach the probe, then run CALIBRATE_PROBE_TRIGGER_HEIGHT (one time)."
    {% endif %}
    M117 Homing Z via probe...
    RESPOND TYPE=echo MSG="Probe attached - homing Z via probe instead of gantry endstop"
    # Home X/Y first if needed (direct to base — X/Y never need the probe).
    {% if 'x' not in printer.toolhead.homed_axes or 'y' not in printer.toolhead.homed_axes %}
        G28.1 X Y
    {% endif %}
    # Move over the bed reference point BEFORE faking Z (no Z motion yet).
    G1 X150 Y150 F12000
    # Declare Z homed near the top so the probing descent has full safe range.
    _SET_KINEMATIC_POSITION_BASE Z={printer.toolhead.axis_maximum.z - 5}
    PROBE
    M400
    _HZWP_FINISH

[gcode_macro _HZWP_FINISH]
description: Internal — set true Z from calibrated trigger height, lift clear
gcode:
    {% set h = printer.save_variables.variables.probe_trigger_height|float %}
    # Toolhead is physically resting at the probe trigger point = h above bed.
    _SET_KINEMATIC_POSITION_BASE Z={h}
    G1 Z15 F1050
    RESPOND TYPE=echo MSG="Z homed via probe (trigger height {h}mm). Convenience reference - prints re-home on the gantry endstop."

# One-time per-unit calibration of the nozzle-to-trigger distance.
# Self-guiding: run CALIBRATE_PROBE_TRIGGER_HEIGHT with the probe DOCKED and
# it homes on the endstop itself, then prompts on KlipperScreen to attach
# the probe and continues. Result persists in variables.cfg.
[gcode_macro CALIBRATE_PROBE_TRIGGER_HEIGHT]
description: Calibrate probe-homing reference. Start with the probe docked - the macro guides the rest.
gcode:
    QUERY_PROBE
    _CPTH_PRECHECK

[gcode_macro _CPTH_PRECHECK]
description: Internal — route calibration by probe/homing state (after fresh QUERY_PROBE)
gcode:
    {% set attached = not printer.probe.last_query %}
    {% set z_homed = 'z' in printer.toolhead.homed_axes %}
    {% if attached and z_homed %}
        # Endstop reference already established and probe on — measure now.
        _CPTH_STAGE2
    {% elif attached %}
        # Cannot establish the endstop Z reference with the probe on the
        # carriage (G28 Z would route to probe-homing / crash the probe).
        _SAFETY_STOP MSG="CALIBRATION: dock the probe first" DETAIL="Calibration needs an endstop Z reference, which requires the probe docked. Dock the probe and re-run CALIBRATE_PROBE_TRIGGER_HEIGHT - it homes and guides you from there."
    {% else %}
        # Probe docked: establish the endstop reference ourselves, then
        # guide the operator through attaching the probe.
        M117 Homing for calibration...
        HOME_IF_NOT
        _CPTH_SHOW_ATTACH_PROMPT
    {% endif %}

[gcode_macro _CPTH_SHOW_ATTACH_PROMPT]
description: Internal — KlipperScreen dialog to attach the probe for calibration
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Probe Calibration"
    RESPOND TYPE=command MSG="action:prompt_text Endstop Z reference set."
    RESPOND TYPE=command MSG="action:prompt_text Attach the probe to the carriage, then tap Continue."
    RESPOND TYPE=command MSG="action:prompt_footer_button Continue|_CPTH_CONTINUE|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_PROMPT_CLOSE|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CPTH_CONTINUE]
description: Internal — operator confirmed probe attached; verify and measure
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    QUERY_PROBE
    _CPTH_STAGE2

[gcode_macro _CPTH_STAGE2]
description: Internal — verify probe attached, probe bed center
gcode:
    {% if printer.probe.last_query %}
        # Not attached yet — re-show the dialog (operator can Cancel out).
        RESPOND TYPE=echo MSG="Probe not detected - attach the probe and tap Continue again."
        _CPTH_SHOW_ATTACH_PROMPT
    {% else %}
        M117 Measuring trigger height...
        G1 Z20 F1050
        G1 X150 Y150 F12000
        PROBE
        M400
        _CPTH_SAVE
    {% endif %}

[gcode_macro _CPTH_SAVE]
description: Internal — persist the measured trigger height
gcode:
    {% set z = printer.toolhead.position.z|float %}
    {% if z <= 0 or z > 20 %}
        _SAFETY_STOP MSG="CALIBRATION: implausible trigger height" DETAIL="Measured trigger height {z|round(3)}mm is implausible (expected ~5-15mm). Not saved - check probe and Z homing."
    {% endif %}
    SAVE_VARIABLE VARIABLE=probe_trigger_height VALUE={z|round(3)}
    G1 Z15 F1050
    RESPOND TYPE=echo MSG="Probe trigger height calibrated: {z|round(3)}mm (saved to variables.cfg). G28 with the probe attached will now home Z via probe."

# --- CONFIRM gates for limit-bypassing commands --------------------------------
# [force_move] (vulcan2.cfg) is required for SET_KINEMATIC_POSITION, but it
# also exposes commands that bypass homing and motion limits to the console.
# Gate direct use behind CONFIRM=1 so a customer can't crash the machine
# with a copy-pasted command; internal macros call the renamed bases.
[gcode_macro FORCE_MOVE]
rename_existing: _FORCE_MOVE_BASE
description: Move a stepper ignoring limits — requires CONFIRM=1
gcode:
    {% if params.CONFIRM|default(0)|int == 1 %}
        _FORCE_MOVE_BASE STEPPER={params.STEPPER|default("")} DISTANCE={params.DISTANCE|default(0)} VELOCITY={params.VELOCITY|default(5)}{% if params.ACCEL is defined %} ACCEL={params.ACCEL}{% endif %}
    {% else %}
        _SAFETY_STOP MSG="FORCE_MOVE blocked - missing CONFIRM=1" DETAIL="FORCE_MOVE bypasses homing and motion limits and can crash the toolhead. Add CONFIRM=1 if you really mean it."
    {% endif %}

[gcode_macro SET_KINEMATIC_POSITION]
rename_existing: _SET_KINEMATIC_POSITION_BASE
description: Force-set toolhead position — requires CONFIRM=1
gcode:
    {% if params.CONFIRM|default(0)|int == 1 %}
        _SET_KINEMATIC_POSITION_BASE{% if params.X is defined %} X={params.X}{% endif %}{% if params.Y is defined %} Y={params.Y}{% endif %}{% if params.Z is defined %} Z={params.Z}{% endif %}
    {% else %}
        _SAFETY_STOP MSG="SET_KINEMATIC_POSITION blocked - missing CONFIRM=1" DETAIL="SET_KINEMATIC_POSITION overrides the printer's believed position - wrong values let later moves crash. Add CONFIRM=1 if you really mean it."
    {% endif %}

[gcode_macro _GUARDED_SCREWS_TILT]
gcode:
    {% if printer.probe.last_query %}
        _SAFETY_STOP MSG="PROBE GUARD: screws tilt blocked - probe not attached" DETAIL="Probe not attached (reads TRIGGERED = detached, pressed, or wiring fault). Attach the Euclid probe (or run PROBE_PICKUP) before screws tilt calculation."
    {% endif %}
    _SCREWS_TILT_CALCULATE_BASE {rawparams}

#home printer and equip probe
[gcode_macro PROBE_PICKUP]
gcode:
  {% set xpos = printer["gcode_macro LNLOS"].probe_pickup_xpos|float %}
  {% set ypos = printer["gcode_macro LNLOS"].probe_pickup_ypos|float %}
  {% set zpos = printer["gcode_macro LNLOS"].probe_pickup_zpos|float %}
  {% set zraise = printer["gcode_macro LNLOS"].probe_pickup_zraise|float %}
  # Safety: abort if the dock position was never calibrated (all zeros) —
  # driving to (0,0,0) would crash the probe/nozzle into the bed corner.
  {% if xpos == 0 and ypos == 0 and zpos == 0 %}
    _SAFETY_STOP MSG="PROBE GUARD: dock not calibrated" DETAIL="Probe dock position not calibrated. Set probe_pickup_x/y/zpos in the LNLOS macro before using the probe dock."
  {% endif %}
  HOME_IF_NOT
  G1 Z{zraise} F1050
  G1 X{xpos} Y{ypos} F12000
  G1 Z{zpos} F1050
  # Lift away from the dock, then re-home X/Y ONLY — homing Z with the
  # probe attached would crash it into the bed (also blocked by the G28
  # guard below). Z remains homed from HOME_IF_NOT above.
  G1 Z{zraise} F1050
  G28 X
  G28 Y
  PROBEON



#home printer and drop probe off at dock
[gcode_macro PROBE_DROPOFF]
gcode:
  {% set xpos = printer["gcode_macro LNLOS"].probe_pickup_xpos|float %}
  {% set xposrel = xpos+10 %}
  {% set ypos = printer["gcode_macro LNLOS"].probe_pickup_ypos|float %}
  {% set zpos = printer["gcode_macro LNLOS"].probe_pickup_zpos|float %}
  {% set zraise = printer["gcode_macro LNLOS"].probe_pickup_zraise|float %}
  # Safety: abort if the dock position was never calibrated (all zeros).
  {% if xpos == 0 and ypos == 0 and zpos == 0 %}
    _SAFETY_STOP MSG="PROBE GUARD: dock not calibrated" DETAIL="Probe dock position not calibrated. Set probe_pickup_x/y/zpos in the LNLOS macro before using the probe dock."
  {% endif %}
  HOME_IF_NOT
  G1 Z{zraise} F1050
  G1 Y{ypos} F12000
  G1 X{xpos} F2500
  G1 Z{zpos} F1050
  G1 X{xposrel} F1250
  G1 Z{zraise} F1050
  G28 X
  G28 Y Z
  PROBEOFF

[gcode_macro _Prepare_BedMesh]
gcode:
  PROBE_PICKUP
  BED_MESH_CALIBRATE
  PROBE_DROPOFF

#equip probe, run screws tilt, remove probe
#end goal will be to equip probe, heat up bed, run screws tilt til acceptable, run mesh, drop off probe, also registering probeon=1/0
[gcode_macro _AUTO_PROBE]
gcode:
  PROBE_PICKUP
  SCREWS_TILT_CALCULATE
  PROBE_DROPOFF