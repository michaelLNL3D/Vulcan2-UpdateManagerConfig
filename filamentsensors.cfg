############################################################
### FILAMENT RUNOUT SENSORS (DISABLED TEMPLATE) ###
############################################################
# The sensor sections below are fully commented out, so this file is inert
# on machines without runout hardware. To enable on a unit that has sensors:
#
#   1. COPY the relevant [filament_switch_sensor ...] block(s) into a file in
#      local/ (e.g. local/runout.cfg) — local/ loads after base/, so your
#      copy takes effect without editing this managed file.
#   2. Uncomment the block and set switch_pin to the actual MCU pin
#      (prefix with ! to invert, ^ for pull-up, e.g. ^!PC4).
#   3. RESTART. Test with QUERY_FILAMENT_SENSOR SENSOR=e1_runout.
#
# The _RUNOUT_HANDLER macro below IS live, but harmless until a sensor
# triggers it. It pauses the print and opens the M600 filament-change prompt.

#[filament_switch_sensor e1_runout]
#switch_pin: ^!PC4            # <-- SET ME: E1 runout sensor pin
#pause_on_runout: False       # we pause via the handler (so the prompt shows)
#runout_gcode: _RUNOUT_HANDLER TOOL=0
#event_delay: 3.0
#pause_delay: 0.5

#[filament_switch_sensor e2_runout]
#switch_pin: ^!PC5            # <-- SET ME: E2 runout sensor pin
#pause_on_runout: False
#runout_gcode: _RUNOUT_HANDLER TOOL=1
#event_delay: 3.0
#pause_delay: 0.5

[gcode_macro _RUNOUT_HANDLER]
description: Filament runout response — pause and prompt for a filament change. Usage: _RUNOUT_HANDLER TOOL=<0|1>
gcode:
    {% set tool = params.TOOL|default(0)|int %}
    M117 Filament runout on E{tool + 1}!
    RESPOND TYPE=error MSG="Filament runout detected on E{tool + 1}"
    {% if printer.print_stats.state == "printing" %}
        M600
    {% else %}
        RESPOND TYPE=echo MSG="Not printing - load new filament with LOAD_FILAMENT TOOL={tool}"
    {% endif %}
