############################################################
### FILAMENT RUNOUT SENSORS ###
############################################################
# Wired to the FORMER gantry Z endstop inputs, freed when Z homing moved to
# the probe (probe:z_virtual_endstop — see HC32F460.cfg / EuclidUtilities.cfg):
#   E1 runout -> PC15 (old stepper_z endstop)
#   E2 runout -> PC14 (old stepper_z1 endstop)
# Pin polarity starts from the old endstop convention (^! = pull-up,
# inverted). After wiring, verify with:
#   QUERY_FILAMENT_SENSOR SENSOR=e1_runout
# Filament present should read "detected". If it reads backwards, flip the
# `!` on switch_pin (override from local/ on a per-unit basis if needed).
#
# pause_on_runout is False because _RUNOUT_HANDLER pauses via M600, which
# shows the KlipperScreen filament-change prompt.

[filament_switch_sensor e1_runout]
switch_pin: ^!PC15
pause_on_runout: False
runout_gcode: _RUNOUT_HANDLER TOOL=0
event_delay: 3.0
pause_delay: 0.5

[filament_switch_sensor e2_runout]
switch_pin: ^!PC14
pause_on_runout: False
runout_gcode: _RUNOUT_HANDLER TOOL=1
event_delay: 3.0
pause_delay: 0.5

[gcode_macro _RUNOUT_HANDLER]
description: Filament runout response — pause and prompt for a filament change. Usage: _RUNOUT_HANDLER TOOL=<0|1>
gcode:
    {% set tool = params.TOOL|default(0)|int %}
    M117 Filament runout on E{tool + 1}!
    RESPOND TYPE=error MSG="Filament runout detected on E{tool + 1}"
    {% if printer.print_stats.state == "printing" %}
        M600
    {% else %}
        RESPOND TYPE=echo MSG="Not printing - load new filament with LOAD_FILAMENT TOOL={tool}"
    {% endif %}
