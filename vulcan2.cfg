############################################################
### FEATURES ###
############################################################
# Enables the EXCLUDE_OBJECT commands so a single object can be skipped
# mid-print (slicer must label objects / Moonraker preprocesses the file).
[exclude_object]

# Enables the G10 (retract) / G11 (unretract) commands and SET_RETRACTION.
# Dormant unless the slicer or a macro actually issues G10/G11 — normal
# G1 E retraction is unaffected. Conservative direct-drive (BMG) defaults;
# tune live with SET_RETRACTION.
[firmware_retraction]
retract_length: 0.5
retract_speed: 35
unretract_extra_length: 0
unretract_speed: 35

# Enables the RESPOND command used throughout the base macros (KlipperScreen
# prompts, status echoes). Required — without it every RESPOND errors.
[respond]

# Enables G2/G3 arc moves so slicer "arc fitting" (OrcaSlicer: Enable Arc
# Fitting) works instead of erroring on unknown commands.
[gcode_arcs]
resolution: 0.1

# Pause-aware idle timeout. Klipper's default (10 min) would shut heaters off
# while PRINT_START_PROBED sits in PAUSE waiting at a KlipperScreen dialog.
# While paused: nozzles off (safety) but bed stays warm and motors stay
# engaged so the print can still resume. Otherwise: full shutdown.
[idle_timeout]
timeout: 1800
gcode:
    {% if printer.pause_resume.is_paused %}
        RESPOND TYPE=echo MSG="Idle timeout while paused - nozzles off, bed kept warm"
        M104 S0 T0
        M104 S0 T1
    {% else %}
        TURN_OFF_HEATERS
        M84
    {% endif %}