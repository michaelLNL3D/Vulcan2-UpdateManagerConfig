# A helper script to activate copy mode
[gcode_macro ACTIVATE_COPY_MODE]
variable_default_xoffset: 150
gcode:
    {% set saved = printer.save_variables.variables %}
    {% set default_xoffset = printer["gcode_macro ACTIVATE_COPY_MODE"].default_xoffset|float %}
    {% set xoffsetpos = params.XOFFSET|default(saved.copy_mode_xoffset|default(default_xoffset))|float %}
    HOME_IF_NOT
    G90
    G1 Z+10 F1050
    RESPOND TYPE=echo MSG="ACTIVATING COPY MODE"
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G1 X0 F9000
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G1 X{xoffsetpos} F9000
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
    _IDEX_MODE MODE=1


# A helper script to activate mirror mode
[gcode_macro ACTIVATE_MIRROR_MODE]
variable_default_xoffset: 300
gcode:
    {% set saved = printer.save_variables.variables %}
    {% set default_xoffset = printer["gcode_macro ACTIVATE_MIRROR_MODE"].default_xoffset|float %}
    {% set xoffsetpos = params.XOFFSET|default(saved.mirror_mode_xoffset|default(default_xoffset))|float %}
    HOME_IF_NOT
    G90
    G1 Z+10 F1050
    RESPOND TYPE=echo MSG="ACTIVATING MIRROR MODE"   
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G1 X0 F9000
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G1 X{xoffsetpos} F9000
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
    _IDEX_MODE MODE=2
    
[gcode_macro ACTIVATE_DUAL_MATERIAL_MODE]
gcode: 
    RESPOND TYPE=echo MSG="ACTIVATING DUAL MATERIAL MODE" 
    G28
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    _IDEX_MODE MODE=0

[gcode_macro ACTIVATE_DUPLICATION_MODE]
description: Compatibility alias for KlipperScreen duplication mode button
gcode:
    ACTIVATE_COPY_MODE

[gcode_macro ACTIVATE_TOOLCHANGER_MODE]
description: Compatibility alias for KlipperScreen toolchanger mode button
gcode:
    ACTIVATE_DUAL_MATERIAL_MODE

[gcode_macro SHOW_IDEX_OFFSETS]
description: Show saved IDEX offsets
gcode:
    {% set saved = printer.save_variables.variables %}
    {% set copy_x = saved.copy_mode_xoffset|default(printer["gcode_macro ACTIVATE_COPY_MODE"].default_xoffset)|float %}
    {% set mirror_x = saved.mirror_mode_xoffset|default(printer["gcode_macro ACTIVATE_MIRROR_MODE"].default_xoffset)|float %}
    {% set idex_x = saved.idex_x_offset|default(printer["gcode_macro T1"].default_x_offset)|float %}
    {% set idex_y = saved.idex_y_offset|default(printer["gcode_macro T1"].default_y_offset)|float %}
    RESPOND TYPE=echo MSG="Copy X offset: {copy_x}"
    RESPOND TYPE=echo MSG="Mirror X offset: {mirror_x}"
    RESPOND TYPE=echo MSG="T1 X/Y offset: {idex_x}, {idex_y}"

[gcode_macro SET_COPY_OFFSET]
description: Save copy mode E2 X offset. Usage: SET_COPY_OFFSET X=<mm>
gcode:
    {% if 'X' not in params %}
      { action_raise_error("SET_COPY_OFFSET requires X=<mm>") }
    {% endif %}
    {% set x = params.X|float %}
    SAVE_VARIABLE VARIABLE=copy_mode_xoffset VALUE={x}
    RESPOND TYPE=echo MSG="Saved copy mode X offset: {x}"

[gcode_macro SET_MIRROR_OFFSET]
description: Save mirror mode E2 X offset. Usage: SET_MIRROR_OFFSET X=<mm>
gcode:
    {% if 'X' not in params %}
      { action_raise_error("SET_MIRROR_OFFSET requires X=<mm>") }
    {% endif %}
    {% set x = params.X|float %}
    SAVE_VARIABLE VARIABLE=mirror_mode_xoffset VALUE={x}
    RESPOND TYPE=echo MSG="Saved mirror mode X offset: {x}"

[gcode_macro SET_IDEX_TOOL_OFFSET]
description: Save T1 XY offset. Usage: SET_IDEX_TOOL_OFFSET X=<mm> Y=<mm>
gcode:
    {% set saved = printer.save_variables.variables %}
    {% set current_x = saved.idex_x_offset|default(printer["gcode_macro T1"].default_x_offset)|float %}
    {% set current_y = saved.idex_y_offset|default(printer["gcode_macro T1"].default_y_offset)|float %}
    {% set x = params.X|default(current_x)|float %}
    {% set y = params.Y|default(current_y)|float %}
    SAVE_VARIABLE VARIABLE=idex_x_offset VALUE={x}
    SAVE_VARIABLE VARIABLE=idex_y_offset VALUE={y}
    RESPOND TYPE=echo MSG="Saved T1 X/Y offset: {x}, {y}"

[gcode_macro NUDGE_COPY_OFFSET]
description: Adjust saved copy mode E2 X offset. Usage: NUDGE_COPY_OFFSET X=<delta_mm>
gcode:
    {% if 'X' not in params %}
      { action_raise_error("NUDGE_COPY_OFFSET requires X=<delta_mm>") }
    {% endif %}
    {% set saved = printer.save_variables.variables %}
    {% set current = saved.copy_mode_xoffset|default(printer["gcode_macro ACTIVATE_COPY_MODE"].default_xoffset)|float %}
    {% set x = current + (params.X|float) %}
    SAVE_VARIABLE VARIABLE=copy_mode_xoffset VALUE={x}
    RESPOND TYPE=echo MSG="Saved copy mode X offset: {x}"

[gcode_macro NUDGE_MIRROR_OFFSET]
description: Adjust saved mirror mode E2 X offset. Usage: NUDGE_MIRROR_OFFSET X=<delta_mm>
gcode:
    {% if 'X' not in params %}
      { action_raise_error("NUDGE_MIRROR_OFFSET requires X=<delta_mm>") }
    {% endif %}
    {% set saved = printer.save_variables.variables %}
    {% set current = saved.mirror_mode_xoffset|default(printer["gcode_macro ACTIVATE_MIRROR_MODE"].default_xoffset)|float %}
    {% set x = current + (params.X|float) %}
    SAVE_VARIABLE VARIABLE=mirror_mode_xoffset VALUE={x}
    RESPOND TYPE=echo MSG="Saved mirror mode X offset: {x}"

[gcode_macro COPY_OFFSET_PLUS01]
description: Increase copy mode E2 X offset by 0.1mm
gcode:
    NUDGE_COPY_OFFSET X=0.1

[gcode_macro COPY_OFFSET_MINUS01]
description: Decrease copy mode E2 X offset by 0.1mm
gcode:
    NUDGE_COPY_OFFSET X=-0.1

[gcode_macro MIRROR_OFFSET_PLUS01]
description: Increase mirror mode E2 X offset by 0.1mm
gcode:
    NUDGE_MIRROR_OFFSET X=0.1

[gcode_macro MIRROR_OFFSET_MINUS01]
description: Decrease mirror mode E2 X offset by 0.1mm
gcode:
    NUDGE_MIRROR_OFFSET X=-0.1

#here, 0 indicates dual material print mode, 1 = copy, 2 = mirror
[gcode_macro _IDEX_MODE]
description: sets variable value for idex mode. 0 for dual material, 1 for copy, 2 for mirror. Usage: _IDEX_MODE MODE=<modenum>
variable_idex_mode: 0
gcode:
  {% set mode = params.MODE|default(0)|int %}

  {% if mode == 0 %}
    RESPOND TYPE=echo MSG="Storing Idex Mode as Dual Material"
  {% elif mode == 1 %}
    RESPOND TYPE=echo MSG="Storing Idex Mode as COPY"
  {% elif mode == 2 %}
    RESPOND TYPE=echo MSG="Storing Idex Mode as MIRROR"
  {% else %}
    RESPOND TYPE=echo MSG="INVALID IDEX MODE, reverting to dual material mode"
    {% set mode = 0 %}
  {% endif %}
  SET_GCODE_VARIABLE MACRO=_IDEX_MODE VARIABLE=idex_mode VALUE={mode}



[gcode_macro _RESTORE_IDEX_MODE]
gcode:
    #RESPOND TYPE=error MSG="RESTORING IDEX MODE" 
    {% set PRINT_MODE = printer["gcode_macro _IDEX_MODE"].idex_mode %}
    {% if PRINT_MODE == 0 %}
      ACTIVATE_DUAL_MATERIAL_MODE
    {% elif PRINT_MODE == 1 %}
      #RESPOND TYPE=error MSG="RESTORING COPY MODE" 
      ACTIVATE_COPY_MODE
    {% elif PRINT_MODE == 2 %}
      #RESPOND TYPE=error MSG="RESTORING MIRROR MODE" 
      ACTIVATE_MIRROR_MODE
    {% endif %}

