# A helper script to activate copy mode
[gcode_macro ACTIVATE_COPY_MODE]
variable_default_xoffset: 150
gcode:
    {% set saved = printer.save_variables.variables %}
    {% set default_xoffset = printer["gcode_macro ACTIVATE_COPY_MODE"].default_xoffset|float %}
    {% set xoffsetpos = params.XOFFSET|default(saved.copy_mode_xoffset|default(default_xoffset))|float %}
    # Clear any E2 tool offset: both nozzles share one Z gantry, so a leftover
    # dual-material offset would shift BOTH heads in copy mode.
    CLEAR_GCODE_OFFSETS
    HOME_IF_NOT
    G90
    G1 Z+10 F1050
    RESPOND TYPE=echo MSG="ACTIVATING COPY MODE"
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G1 X0 F9000
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G1 X{xoffsetpos} F9000
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
    _IDEX_MODE MODE=1


# A helper script to activate mirror mode
[gcode_macro ACTIVATE_MIRROR_MODE]
variable_default_xoffset: 300
gcode:
    {% set saved = printer.save_variables.variables %}
    {% set default_xoffset = printer["gcode_macro ACTIVATE_MIRROR_MODE"].default_xoffset|float %}
    {% set xoffsetpos = params.XOFFSET|default(saved.mirror_mode_xoffset|default(default_xoffset))|float %}
    # Clear any E2 tool offset: both nozzles share one Z gantry, so a leftover
    # dual-material offset would shift BOTH heads in mirror mode.
    CLEAR_GCODE_OFFSETS
    HOME_IF_NOT
    G90
    G1 Z+10 F1050
    RESPOND TYPE=echo MSG="ACTIVATING MIRROR MODE"
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G1 X0 F9000
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G1 X{xoffsetpos} F9000
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
    _IDEX_MODE MODE=2
    
[gcode_macro ACTIVATE_DUAL_MATERIAL_MODE]
gcode: 
    RESPOND TYPE=echo MSG="ACTIVATING DUAL MATERIAL MODE"
    G28
    CLEAR_GCODE_OFFSETS
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    _IDEX_MODE MODE=0

[gcode_macro ACTIVATE_DUPLICATION_MODE]
description: Compatibility alias for KlipperScreen duplication mode button
gcode:
    ACTIVATE_COPY_MODE

[gcode_macro ACTIVATE_TOOLCHANGER_MODE]
description: Compatibility alias for KlipperScreen toolchanger mode button
gcode:
    ACTIVATE_DUAL_MATERIAL_MODE

[gcode_macro SHOW_IDEX_OFFSETS]
description: Show saved IDEX offsets
gcode:
    {% set saved = printer.save_variables.variables %}
    {% set copy_x = saved.copy_mode_xoffset|default(printer["gcode_macro ACTIVATE_COPY_MODE"].default_xoffset)|float %}
    {% set mirror_x = saved.mirror_mode_xoffset|default(printer["gcode_macro ACTIVATE_MIRROR_MODE"].default_xoffset)|float %}
    {% set idex_x = saved.idex_x_offset|default(printer["gcode_macro T1"].default_x_offset)|float %}
    {% set idex_y = saved.idex_y_offset|default(printer["gcode_macro T1"].default_y_offset)|float %}
    {% set idex_z = saved.idex_z_offset|default(printer["gcode_macro T1"].default_z_offset)|float %}
    RESPOND TYPE=echo MSG="E2 X/Y/Z: {idex_x}/{idex_y}/{idex_z}  |  Copy X: {copy_x}  Mirror X: {mirror_x}"

[gcode_macro SET_COPY_OFFSET]
description: Save copy mode E2 X offset. Usage: SET_COPY_OFFSET X=<mm>
gcode:
    {% if 'X' not in params %}
      { action_raise_error("SET_COPY_OFFSET requires X=<mm>") }
    {% endif %}
    {% set x = params.X|float %}
    SAVE_VARIABLE VARIABLE=copy_mode_xoffset VALUE={x}
    RESPOND TYPE=echo MSG="Saved copy mode X offset: {x}"

[gcode_macro SET_MIRROR_OFFSET]
description: Save mirror mode E2 X offset. Usage: SET_MIRROR_OFFSET X=<mm>
gcode:
    {% if 'X' not in params %}
      { action_raise_error("SET_MIRROR_OFFSET requires X=<mm>") }
    {% endif %}
    {% set x = params.X|float %}
    SAVE_VARIABLE VARIABLE=mirror_mode_xoffset VALUE={x}
    RESPOND TYPE=echo MSG="Saved mirror mode X offset: {x}"

[gcode_macro SET_IDEX_TOOL_OFFSET]
description: Save T1 XYZ offset. Usage: SET_IDEX_TOOL_OFFSET X=<mm> Y=<mm> Z=<mm>
gcode:
    {% set saved = printer.save_variables.variables %}
    {% set current_x = saved.idex_x_offset|default(printer["gcode_macro T1"].default_x_offset)|float %}
    {% set current_y = saved.idex_y_offset|default(printer["gcode_macro T1"].default_y_offset)|float %}
    {% set current_z = saved.idex_z_offset|default(printer["gcode_macro T1"].default_z_offset)|float %}
    {% set x = params.X|default(current_x)|float %}
    {% set y = params.Y|default(current_y)|float %}
    {% set z = params.Z|default(current_z)|float %}
    SAVE_VARIABLE VARIABLE=idex_x_offset VALUE={x}
    SAVE_VARIABLE VARIABLE=idex_y_offset VALUE={y}
    SAVE_VARIABLE VARIABLE=idex_z_offset VALUE={z}
    RESPOND TYPE=echo MSG="Saved T1 X/Y/Z offset: {x}, {y}, {z}"

[gcode_macro NUDGE_IDEX_OFFSET]
description: Live-adjust + persist the E2 (T1) tool offset. Usage: NUDGE_IDEX_OFFSET [X=<d>] [Y=<d>] [Z=<d>]
gcode:
  {% if printer["gcode_macro _IDEX_MODE"].idex_mode != 0 %}
    # E1/E2 share one Z gantry: tool offsets are only meaningful in dual
    # material mode. In copy/mirror both heads move together.
    RESPOND TYPE=echo MSG="E2 offsets can only be set in dual material mode"
  {% else %}
    {% set saved = printer.save_variables.variables %}
    {% set dx = params.X|default(0)|float %}
    {% set dy = params.Y|default(0)|float %}
    {% set dz = params.Z|default(0)|float %}
    {% set cur_x = saved.idex_x_offset|default(printer["gcode_macro T1"].default_x_offset)|float %}
    {% set cur_y = saved.idex_y_offset|default(printer["gcode_macro T1"].default_y_offset)|float %}
    {% set cur_z = saved.idex_z_offset|default(printer["gcode_macro T1"].default_z_offset)|float %}
    {% set nx = cur_x + dx %}
    {% set ny = cur_y + dy %}
    {% set nz = cur_z + dz %}
    # Persist the new totals so they apply at every future T1 activation.
    SAVE_VARIABLE VARIABLE=idex_x_offset VALUE={nx}
    SAVE_VARIABLE VARIABLE=idex_y_offset VALUE={ny}
    SAVE_VARIABLE VARIABLE=idex_z_offset VALUE={nz}
    # Apply the change live (babystep) ONLY while E2 is the active tool, so
    # tuning during a test print moves immediately. Skipped if E1 is active
    # (would otherwise shift E1) or axes aren't homed.
    {% if printer.toolhead.extruder == "extruder1" and "xyz" in printer.toolhead.homed_axes %}
      SET_GCODE_OFFSET X_ADJUST={dx} Y_ADJUST={dy} Z_ADJUST={dz} MOVE=1
    {% endif %}
    RESPOND TYPE=echo MSG="E2 tool offset now X={nx} Y={ny} Z={nz}"
  {% endif %}

[gcode_macro _IDEX_OFFSET_SET_STEP]
description: Internal - set the step size used by the E2 offset panel, then redraw it
# Holds the panel's current step size (session only; resets to 0.05 on restart).
# Mirrors KlipperScreen's built-in Z Calibrate panel: a distance row where the
# selected value stays highlighted, driving single +/- buttons per axis.
variable_step: 0.05
gcode:
    {% set requested = params.STEP|default(0.05)|float %}
    {% if requested in [0.01, 0.05, 0.1, 1.0] %}
      {% set new_step = requested %}
    {% else %}
      RESPOND TYPE=echo MSG="Invalid step {requested}, falling back to 0.05"
      {% set new_step = 0.05 %}
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_IDEX_OFFSET_SET_STEP VARIABLE=step VALUE={new_step}
    IDEX_OFFSET_PANEL

[gcode_macro IDEX_OFFSET_PANEL]
description: KlipperScreen dialog to view / live-adjust the E2 (T1) tool offset
gcode:
    {% set saved = printer.save_variables.variables %}
    {% set ix = saved.idex_x_offset|default(printer["gcode_macro T1"].default_x_offset)|float %}
    {% set iy = saved.idex_y_offset|default(printer["gcode_macro T1"].default_y_offset)|float %}
    {% set iz = saved.idex_z_offset|default(printer["gcode_macro T1"].default_z_offset)|float %}
    {% set step = printer["gcode_macro _IDEX_OFFSET_SET_STEP"].step|float %}
    RESPOND TYPE=command MSG="action:prompt_begin E2 Tool Offset"
    {% if printer["gcode_macro _IDEX_MODE"].idex_mode != 0 %}
      RESPOND TYPE=command MSG="action:prompt_text E2 offsets are dual-material mode only (E1/E2 share one Z gantry)."
    {% else %}
      RESPOND TYPE=command MSG="action:prompt_text Current  X={ix}  Y={iy}  Z={iz} mm  (step: {step}).  Adjust while E2 is active during a test print."
      # Step selector row: the active step is highlighted (primary), like the
      # distance row on KlipperScreen's built-in Z Calibrate panel.
      RESPOND TYPE=command MSG="action:prompt_button_group_start"
      {% for s in [0.01, 0.05, 0.1, 1.0] %}
        RESPOND TYPE=command MSG="action:prompt_button {s}|_IDEX_OFFSET_SET_STEP STEP={s}|{'primary' if s == step else 'secondary'}"
      {% endfor %}
      RESPOND TYPE=command MSG="action:prompt_button_group_end"
      # One +/- pair per axis, moving by the selected step.
      {% for axis in ['X', 'Y', 'Z'] %}
        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button {axis} -{step}|_IDEX_OFFSET_STEP {axis}=-{step}|secondary"
        RESPOND TYPE=command MSG="action:prompt_button {axis} +{step}|_IDEX_OFFSET_STEP {axis}={step}|primary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"
      {% endfor %}
    {% endif %}
    RESPOND TYPE=command MSG="action:prompt_footer_button Close|_PROMPT_CLOSE|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _IDEX_OFFSET_STEP]
description: Internal - nudge the E2 offset then refresh the dialog in place
gcode:
    {% set x = params.X|default(0)|float %}
    {% set y = params.Y|default(0)|float %}
    {% set z = params.Z|default(0)|float %}
    NUDGE_IDEX_OFFSET X={x} Y={y} Z={z}
    IDEX_OFFSET_PANEL

[gcode_macro _PROMPT_CLOSE]
description: Close any open KlipperScreen prompt dialog
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro NUDGE_COPY_OFFSET]
description: Adjust saved copy mode E2 X offset. Usage: NUDGE_COPY_OFFSET X=<delta_mm>
gcode:
    {% if 'X' not in params %}
      { action_raise_error("NUDGE_COPY_OFFSET requires X=<delta_mm>") }
    {% endif %}
    {% set saved = printer.save_variables.variables %}
    {% set current = saved.copy_mode_xoffset|default(printer["gcode_macro ACTIVATE_COPY_MODE"].default_xoffset)|float %}
    {% set x = current + (params.X|float) %}
    SAVE_VARIABLE VARIABLE=copy_mode_xoffset VALUE={x}
    RESPOND TYPE=echo MSG="Saved copy mode X offset: {x}"

[gcode_macro NUDGE_MIRROR_OFFSET]
description: Adjust saved mirror mode E2 X offset. Usage: NUDGE_MIRROR_OFFSET X=<delta_mm>
gcode:
    {% if 'X' not in params %}
      { action_raise_error("NUDGE_MIRROR_OFFSET requires X=<delta_mm>") }
    {% endif %}
    {% set saved = printer.save_variables.variables %}
    {% set current = saved.mirror_mode_xoffset|default(printer["gcode_macro ACTIVATE_MIRROR_MODE"].default_xoffset)|float %}
    {% set x = current + (params.X|float) %}
    SAVE_VARIABLE VARIABLE=mirror_mode_xoffset VALUE={x}
    RESPOND TYPE=echo MSG="Saved mirror mode X offset: {x}"

[gcode_macro COPY_OFFSET_PLUS01]
description: Increase copy mode E2 X offset by 0.1mm
gcode:
    NUDGE_COPY_OFFSET X=0.1

[gcode_macro COPY_OFFSET_MINUS01]
description: Decrease copy mode E2 X offset by 0.1mm
gcode:
    NUDGE_COPY_OFFSET X=-0.1

[gcode_macro MIRROR_OFFSET_PLUS01]
description: Increase mirror mode E2 X offset by 0.1mm
gcode:
    NUDGE_MIRROR_OFFSET X=0.1

[gcode_macro MIRROR_OFFSET_MINUS01]
description: Decrease mirror mode E2 X offset by 0.1mm
gcode:
    NUDGE_MIRROR_OFFSET X=-0.1

#here, 0 indicates dual material print mode, 1 = copy, 2 = mirror
[gcode_macro _IDEX_MODE]
description: sets variable value for idex mode. 0 for dual material, 1 for copy, 2 for mirror. Usage: _IDEX_MODE MODE=<modenum>
variable_idex_mode: 0
gcode:
  {% set mode = params.MODE|default(0)|int %}

  {% if mode == 0 %}
    RESPOND TYPE=echo MSG="Storing Idex Mode as Dual Material"
  {% elif mode == 1 %}
    RESPOND TYPE=echo MSG="Storing Idex Mode as COPY"
  {% elif mode == 2 %}
    RESPOND TYPE=echo MSG="Storing Idex Mode as MIRROR"
  {% else %}
    RESPOND TYPE=echo MSG="INVALID IDEX MODE, reverting to dual material mode"
    {% set mode = 0 %}
  {% endif %}
  SET_GCODE_VARIABLE MACRO=_IDEX_MODE VARIABLE=idex_mode VALUE={mode}



[gcode_macro _RESTORE_IDEX_MODE]
gcode:
    #RESPOND TYPE=error MSG="RESTORING IDEX MODE" 
    {% set PRINT_MODE = printer["gcode_macro _IDEX_MODE"].idex_mode %}
    {% if PRINT_MODE == 0 %}
      ACTIVATE_DUAL_MATERIAL_MODE
    {% elif PRINT_MODE == 1 %}
      #RESPOND TYPE=error MSG="RESTORING COPY MODE" 
      ACTIVATE_COPY_MODE
    {% elif PRINT_MODE == 2 %}
      #RESPOND TYPE=error MSG="RESTORING MIRROR MODE" 
      ACTIVATE_MIRROR_MODE
    {% endif %}

### ------------------------------ ###
# Activate the primary extruder
[gcode_macro T0]
description: Activates E1 and clears gcode offsets for idex
# set up to ignore T0 and T1 if unit is actively in mirror or copy mode
gcode:
        {% if printer["gcode_macro _IDEX_MODE"].idex_mode != 0 %}
            # In copy/mirror mode E1 cannot be controlled independently.
            # Refuse BEFORE any homing/parking so E2 does not move.
          {% if printer.idle_timeout.state != "Printing"%}
            RESPOND TYPE=echo MSG="Please switch back to dual material mode to independently control e1"
          {% endif %}
        {% else %}
            SET_GCODE_OFFSET X=0 Y=0 Z=0
            HOME_IF_NOT
            {% if printer.toolhead.extruder != "extruder" %}
                PARK_extruder1
            {% endif %}
            SET_DUAL_CARRIAGE CARRIAGE=0
            ACTIVATE_EXTRUDER EXTRUDER=extruder
          {% if printer.idle_timeout.state == "Printing" %}
            # Standby management: drop the now-idle E2 to (its temp - delta),
            # bring active E1 to full and WAIT before resuming the print.
            {% set tt = printer["gcode_macro _TOOL_TEMPS"] %}
            {% set d = tt.standby_delta|float %}
            {% if tt.t1|float > 0 %}M104 T1 S{tt.t1|float - d}{% endif %}
            {% if tt.t0|float > 0 %}M109 T0 S{tt.t0}{% endif %}
          {% else %}
            RESPOND TYPE=echo MSG="E1 is now the active extruder"
          {% endif %}
        {% endif %}

### ------------------------------ ###
# activate secondary toolhead
[gcode_macro T1]
description: Activates E2 and applies gcode offset for idex
variable_default_x_offset: 0
variable_default_y_offset: 0
variable_default_z_offset: 0
gcode:
   {% if printer["gcode_macro _IDEX_MODE"].idex_mode != 0 %}
     # In copy/mirror mode E2 cannot be controlled independently.
     # Refuse BEFORE any homing/parking so E1 does not move.
     {% if printer.idle_timeout.state != "Printing"%}
       RESPOND TYPE=echo MSG="Please switch back to dual material mode to independently control e2"
     {% endif %}
   {% else %}
     {% set saved = printer.save_variables.variables %}
     {% set idex_x = saved.idex_x_offset|default(printer["gcode_macro T1"].default_x_offset)|float %}
     {% set idex_y = saved.idex_y_offset|default(printer["gcode_macro T1"].default_y_offset)|float %}
     {% set idex_z = saved.idex_z_offset|default(printer["gcode_macro T1"].default_z_offset)|float %}
     HOME_IF_NOT
     {% if printer.toolhead.extruder != "extruder1" %}
       PARK_extruder
     {% endif %}
     ACTIVATE_EXTRUDER EXTRUDER=extruder1
     SET_DUAL_CARRIAGE CARRIAGE=1
     # Apply the tool offset AFTER parking (PARK_extruder zeroes X/Y offset).
     SET_GCODE_OFFSET X={idex_x} Y={idex_y} Z={idex_z}
     {% if printer.idle_timeout.state == "Printing" %}
       # Standby management: drop the now-idle E1 to (its temp - delta),
       # bring active E2 to full and WAIT before resuming the print.
       {% set tt = printer["gcode_macro _TOOL_TEMPS"] %}
       {% set d = tt.standby_delta|float %}
       {% if tt.t0|float > 0 %}M104 T0 S{tt.t0|float - d}{% endif %}
       {% if tt.t1|float > 0 %}M109 T1 S{tt.t1}{% endif %}
     {% else %}
       RESPOND TYPE=echo MSG="E2 is now the active extruder"
     {% endif %}
   {% endif %}


[gcode_macro CLEAR_GCODE_OFFSETS]
gcode:
    SET_GCODE_OFFSET X=0 Y=0 Z=0

# Helper script to park the carriage (called from T0 and T1 macros)
[gcode_macro PARK_extruder]
gcode:
	M117 Parking the leftmost extruder (E1)
	#make sure we move the first carriage
	SET_DUAL_CARRIAGE CARRIAGE=0
	{% if not "x" in printer.toolhead.homed_axes %}
	    RESPOND MSG="Homing X"
	    G28 X
	{% endif %}
    SAVE_GCODE_STATE NAME=park0
    G90
	SET_GCODE_OFFSET X=0 Y=0 #Z=0
    G1 X{printer.configfile.settings.stepper_x.position_min} F15000
    RESTORE_GCODE_STATE NAME=park0

[gcode_macro PARK_extruder1]
gcode:
	M117 Parking the rightmost extruder (E2)
	#make sure we move the second carriage. After all, we do not know which carriage is active
	SET_DUAL_CARRIAGE CARRIAGE=1
	{% if not "x" in printer.toolhead.homed_axes %}
	    RESPOND MSG="Homing X"
	    G28 X
	{% endif %}
    SAVE_GCODE_STATE NAME=park1
    G90
	SET_GCODE_OFFSET X=0 Y=0 #Z=0
    G1 X{printer.configfile.settings.dual_carriage.position_max} F15000
    RESTORE_GCODE_STATE NAME=park1

[gcode_macro calibrate_z_e2]
gcode:
    G28
    T1
  {% if printer["gcode_macro _IDEX_MODE"].idex_mode == 0 %}
    G1 Z+10 F1050
    G1 X150 Y150 F6000
    G1 Z0 F500
    RESPOND MSG="Please Adjust Wheel at back of E2 once nozzle is above bed"
  {% endif %}
