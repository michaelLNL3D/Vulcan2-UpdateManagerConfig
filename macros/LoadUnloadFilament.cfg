############################################################
### FILAMENT LOAD / UNLOAD / CHANGE ###
############################################################
# Usage:
#   LOAD_FILAMENT   [TOOL=<0|1>] [EXTRUDER_TEMP=<t>] [SPEED=<mm/min>]
#   UNLOAD_FILAMENT [TOOL=<0|1>] [EXTRUDER_TEMP=<t>]
#   M600            — filament change during a print (pause + prompt)
# TOOL selects the extruder (0=E1, 1=E2); if omitted, the currently
# active extruder is used.

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance:  100
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
      RESPOND TYPE=echo MSG="Please Home X and Z first"
    {% else %}
      # Select the requested tool (defaults to active extruder).
      {% if params.TOOL is defined %}
        T{params.TOOL|int}
      {% endif %}
      # Lift Z RELATIVELY (G91) so the nozzle moves UP 5mm — never toward
      # the bed — then clamp against the Z travel limit.
      {% set z_lift = [[5, printer.toolhead.axis_maximum.z - printer.toolhead.position.z]|min, 0]|max %}
      G91
      G1 Z{z_lift} F1050
      G90
      G28 X
      RESPOND TYPE=echo MSG="Extruder Heating, Filament will retract shortly"
      {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(240)|float %}
      # Read limits from whichever extruder is actually active.
      {% set active = printer.toolhead.extruder %}
      {% set max_velocity = printer.configfile.settings[active].max_extrude_only_velocity * 60 %}
      SAVE_GCODE_STATE NAME=unload_state
      M109 S{EXTRUDER_TEMP}
      G91
      G92 E0
      G1 E-{unload_distance} F{max_velocity} # fast-unload
      RESTORE_GCODE_STATE NAME=unload_state
      RESPOND TYPE=echo MSG="Filament Retracted, Please pull filament from the extruder"
    {% endif %}

[gcode_macro LOAD_FILAMENT]
variable_purge_distance:  50
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
      RESPOND TYPE=echo MSG="Please Home X and Z first"
    {% else %}
      # Select the requested tool (defaults to active extruder).
      {% if params.TOOL is defined %}
        T{params.TOOL|int}
      {% endif %}
      # Lift Z RELATIVELY (G91) so the nozzle moves UP 5mm — never toward
      # the bed — then clamp against the Z travel limit.
      {% set z_lift = [[5, printer.toolhead.axis_maximum.z - printer.toolhead.position.z]|min, 0]|max %}
      G91
      G1 Z{z_lift} F1050
      G90
      G28 X
      RESPOND TYPE=echo MSG="Extruder Heating, Please feed filament fully into extruder"
      {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(240)|float %}
      {% set speed = params.SPEED|default(600) %}
      SAVE_GCODE_STATE NAME=load_state
      M109 S{EXTRUDER_TEMP}
      RESPOND TYPE=echo MSG="Extruder Heated, Purging Filament. Please make sure filament extrudes"
      G91
      G92 E0
      G1 E{purge_distance} F{speed} # purge
      RESTORE_GCODE_STATE NAME=load_state
    {% endif %}

############################################################
### M600 — FILAMENT CHANGE ###
############################################################
# Standard filament-change command (slicers / runout sensors emit M600).
# If runout toolhead swap is enabled, the runout tool is parked and the
# opposite tool heats, purges, and resumes automatically. Otherwise the print
# pauses and shows a prompt; that prompt still offers a one-time switch action.
[gcode_macro _RUNOUT_STATE]
description: Internal state for filament runout prompts.
variable_tool: -1
variable_toolhead_swap_enabled: 0
gcode:
    RESPOND TYPE=echo MSG="Last runout tool: {printer['gcode_macro _RUNOUT_STATE'].tool}; runout toolhead swap: {printer['gcode_macro _RUNOUT_STATE'].toolhead_swap_enabled}"

[gcode_macro SET_RUNOUT_TOOLHEAD_SWAP]
description: Enable or disable automatic runout toolhead swap. Usage: SET_RUNOUT_TOOLHEAD_SWAP ENABLE=<0|1>
gcode:
    {% set enable = params.ENABLE|default(1)|int %}
    {% if enable not in [0, 1] %}
      { action_raise_error("SET_RUNOUT_TOOLHEAD_SWAP ENABLE must be 0 or 1") }
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_RUNOUT_STATE VARIABLE=toolhead_swap_enabled VALUE={enable}
    RESPOND TYPE=echo MSG="Automatic runout toolhead swap {'enabled' if enable == 1 else 'disabled'}"

[gcode_macro ENABLE_RUNOUT_TOOLHEAD_SWAP]
description: Automatically switch to the other toolhead on filament runout.
gcode:
    SET_RUNOUT_TOOLHEAD_SWAP ENABLE=1

[gcode_macro DISABLE_RUNOUT_TOOLHEAD_SWAP]
description: Disable automatic runout toolhead swap.
gcode:
    SET_RUNOUT_TOOLHEAD_SWAP ENABLE=0

[gcode_macro QUERY_RUNOUT_TOOLHEAD_SWAP]
description: Report whether automatic runout toolhead swap is enabled.
gcode:
    {% set enabled = printer["gcode_macro _RUNOUT_STATE"].toolhead_swap_enabled|int %}
    RESPOND TYPE=echo MSG="Automatic runout toolhead swap is {'enabled' if enabled == 1 else 'disabled'}"

[gcode_macro RUNOUT_TOOLHEAD_SWAP_SELECTOR]
description: KlipperScreen selector for automatic runout toolhead swap.
gcode:
    {% set enabled = printer["gcode_macro _RUNOUT_STATE"].toolhead_swap_enabled|int %}
    RESPOND TYPE=command MSG="action:prompt_begin Runout Toolhead Swap"
    {% if enabled == 1 %}
      RESPOND TYPE=command MSG="action:prompt_text Currently enabled. Runout will automatically switch to the other toolhead, purge, and resume."
    {% else %}
      RESPOND TYPE=command MSG="action:prompt_text Currently disabled. Runout will pause and show a prompt with a one-time Switch Toolhead + Resume option."
    {% endif %}
    RESPOND TYPE=command MSG="action:prompt_text This setting resets to disabled after END_PRINT or CANCEL_PRINT."
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Enable|_RUNOUT_SET_TOOLHEAD_SWAP ENABLE=1|{'primary' if enabled == 1 else 'secondary'}"
    RESPOND TYPE=command MSG="action:prompt_button Disable|_RUNOUT_SET_TOOLHEAD_SWAP ENABLE=0|{'primary' if enabled == 0 else 'secondary'}"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Close|_PROMPT_CLOSE|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _RUNOUT_SET_TOOLHEAD_SWAP]
description: Internal - set runout toolhead swap state and refresh the selector prompt.
gcode:
    {% set enable = params.ENABLE|default(1)|int %}
    SET_RUNOUT_TOOLHEAD_SWAP ENABLE={enable}
    RUNOUT_TOOLHEAD_SWAP_SELECTOR

[gcode_macro _RUNOUT_RESET_TOOLHEAD_SWAP]
description: Internal - reset automatic runout toolhead swap to its safe default.
gcode:
    SET_GCODE_VARIABLE MACRO=_RUNOUT_STATE VARIABLE=toolhead_swap_enabled VALUE=0

[gcode_macro M600]
description: Filament change — pause print and prompt to swap filament
gcode:
    {% if params.TOOL is defined %}
      {% set runout_tool = params.TOOL|int %}
    {% elif printer.toolhead.extruder == "extruder1" %}
      {% set runout_tool = 1 %}
    {% else %}
      {% set runout_tool = 0 %}
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_RUNOUT_STATE VARIABLE=tool VALUE={runout_tool}
    {% if printer['gcode_macro _RUNOUT_STATE'].toolhead_swap_enabled|int == 1 and printer.print_stats.state == "printing" %}
      _RUNOUT_SWITCH_AND_RESUME TOOL={runout_tool} AUTO=1
    {% else %}
      {% if printer.pause_resume.is_paused %}
        RESPOND TYPE=echo MSG="Print already paused - swap filament then RESUME"
      {% else %}
        PAUSE
      {% endif %}
      _RUNOUT_FILAMENT_PROMPT
    {% endif %}

[gcode_macro _RUNOUT_FILAMENT_PROMPT]
description: Internal - show the runout filament-change prompt.
gcode:
    {% if printer.pause_resume.is_paused %}
      RESPOND TYPE=echo MSG="Runout prompt shown while print is paused"
    {% else %}
      PAUSE
    {% endif %}
    RESPOND TYPE=command MSG="action:prompt_begin Filament Change"
    RESPOND TYPE=command MSG="action:prompt_text Print paused for a filament change."
    RESPOND TYPE=command MSG="action:prompt_text Unload and load filament, or switch to the other toolhead for this runout."
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Unload|UNLOAD_FILAMENT|secondary"
    RESPOND TYPE=command MSG="action:prompt_button Load|LOAD_FILAMENT|secondary"
    RESPOND TYPE=command MSG="action:prompt_button Switch Toolhead + Resume|_RUNOUT_SWITCH_AND_RESUME|secondary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Resume Print|RESUME|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel Print|CANCEL_PRINT|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _RUNOUT_PURGE_ACTIVE_TOOL]
description: Internal - purge the active tool at the pause park position before resuming.
variable_purge_distance: 50
variable_purge_speed: 600
gcode:
    {% set distance = params.DISTANCE|default(printer["gcode_macro _RUNOUT_PURGE_ACTIVE_TOOL"].purge_distance)|float %}
    {% set speed = params.SPEED|default(printer["gcode_macro _RUNOUT_PURGE_ACTIVE_TOOL"].purge_speed)|float %}
    {% set active = printer.toolhead.extruder %}
    {% set max_velocity = printer.configfile.settings[active].max_extrude_only_velocity * 60 %}
    {% set purge_speed = [speed, max_velocity]|min %}
    SAVE_GCODE_STATE NAME=runout_purge_state
    M83
    G92 E0
    G1 E{distance} F{purge_speed}
    RESTORE_GCODE_STATE NAME=runout_purge_state

[gcode_macro _RUNOUT_SWITCH_AND_RESUME]
description: Switch to the other IDEX tool after runout, purge, and resume the paused print.
gcode:
    {% set runout_tool = params.TOOL|default(printer["gcode_macro _RUNOUT_STATE"].tool)|int %}
    {% set auto = params.AUTO|default(0)|int %}
    {% if runout_tool not in [0, 1] %}
      {% if printer.toolhead.extruder == "extruder1" %}
        {% set runout_tool = 1 %}
      {% else %}
        {% set runout_tool = 0 %}
      {% endif %}
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_RUNOUT_STATE VARIABLE=tool VALUE={runout_tool}
    {% set alternate_tool = 1 if runout_tool == 0 else 0 %}
    {% set tt = printer["gcode_macro _TOOL_TEMPS"] %}
    {% set configured_temp = tt.t0|float if alternate_tool == 0 else tt.t1|float %}
    {% set active_target = printer[printer.toolhead.extruder].target|float if printer.toolhead.extruder else 0 %}
    {% set target_temp = configured_temp if configured_temp > 0 else active_target %}
    {% if printer["gcode_macro _IDEX_MODE"].idex_mode|int != 0 %}
      {% if auto == 1 %}
        _RUNOUT_RESET_TOOLHEAD_SWAP
      {% endif %}
      RESPOND TYPE=error MSG="Switch Toolhead + Resume is only available in dual-material mode."
      {% if not printer.pause_resume.is_paused %}
        PAUSE
      {% endif %}
      _RUNOUT_FILAMENT_PROMPT
    {% elif target_temp <= 0 %}
      {% if auto == 1 %}
        _RUNOUT_RESET_TOOLHEAD_SWAP
      {% endif %}
      RESPOND TYPE=error MSG="No target temperature is available for E{alternate_tool + 1}; load filament manually, then resume."
      {% if not printer.pause_resume.is_paused %}
        PAUSE
      {% endif %}
      _RUNOUT_FILAMENT_PROMPT
    {% else %}
      RESPOND TYPE=command MSG="action:prompt_end"
      RESPOND TYPE=echo MSG="{'Automatically switching' if auto == 1 else 'Switching'} from E{runout_tool + 1} to E{alternate_tool + 1} after runout"
      {% if not printer.pause_resume.is_paused %}
        PAUSE
      {% endif %}
      T{alternate_tool}
      M109 T{alternate_tool} S{target_temp}
      SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=last_extruder_temp VALUE="{{ {'restore': True, 'temp': target_temp} }}"
      _RUNOUT_PURGE_ACTIVE_TOOL
      RESUME
    {% endif %}
