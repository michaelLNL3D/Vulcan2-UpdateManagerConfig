############################################################
### PRINT START / END LIFECYCLE ###
############################################################
# Which start macro to put in your slicer's start G-code:
#   PRINT_START         — headless start: homes, loads the SAVED 'default'
#                         bed mesh (or prints without one). Use when the bed
#                         mesh is already dialed in and no operator is present.
#   PRINT_START_PROBED  — interactive start: walks the operator through
#                         attaching/removing the Euclid probe via KlipperScreen
#                         dialogs and takes a FRESH mesh every print.
# Both accept: BED_TEMP / EXTRUDER0_TEMP / EXTRUDER1_TEMP / [EXTRUDER_TEMP] / USETOOL=<0|1|2>

### ------------------------------ ###
# Holds the per-tool print temperatures captured by PRINT_START, plus the
# standby drop. T0/T1 read these to set the idle nozzle to (print_temp - delta)
# during a dual-material print. Values reset to 0 by END_PRINT/CANCEL_PRINT.
# standby_delta is seeded from the LNLOS settings holder at startup (see
# _SYNC_STANDBY_DELTA below) so it can be tuned from local/ overrides.
[gcode_macro _TOOL_TEMPS]
variable_t0: 0
variable_t1: 0
variable_standby_delta: 25
gcode:
    RESPOND TYPE=echo MSG="Tool temps T0={printer['gcode_macro _TOOL_TEMPS'].t0} T1={printer['gcode_macro _TOOL_TEMPS'].t1} (standby -{printer['gcode_macro _TOOL_TEMPS'].standby_delta}C)"

# Copy the customer-tunable standby delta out of LNLOS once at startup.
[delayed_gcode _SYNC_STANDBY_DELTA]
initial_duration: 2
gcode:
    {% set lnl = printer["gcode_macro LNLOS"] %}
    {% if lnl.standby_delta is defined %}
        SET_GCODE_VARIABLE MACRO=_TOOL_TEMPS VARIABLE=standby_delta VALUE={lnl.standby_delta}
    {% endif %}

### ------------------------------ ###

# Probe polarity (NC wiring — see base/HC32F460.cfg):
#   attached idle = open (last_query False) | detached/pressed = TRIGGERED (True)
# Two-stage: the check renders in a second macro so it reads the FRESH
# QUERY_PROBE result (templates render before commands execute).
# Cancels rather than raises so heaters/state shut down cleanly mid-start.
[gcode_macro ASSERT_PROBE_DOCKED]
description: Cancel the print if the probe is attached
gcode:
    QUERY_PROBE
    _ASSERT_PROBE_DOCKED_CHECK

[gcode_macro _ASSERT_PROBE_DOCKED_CHECK]
description: Internal — cancel if probe reads attached (after fresh QUERY_PROBE)
gcode:
    {% if not printer.probe.last_query %}
        M117 Probe attached - print cancelled
        RESPOND TYPE=error MSG="SAFETY STOP: Probe is attached. Dock/remove the probe, then restart the print."
        RESPOND TYPE=command MSG="action:prompt_begin Safety Stop"
        RESPOND TYPE=command MSG="action:prompt_text Print cancelled: the probe is still attached. Dock/remove the probe, then start the print again."
        RESPOND TYPE=command MSG="action:prompt_footer_button OK|_PROMPT_CLOSE|error"
        RESPOND TYPE=command MSG="action:prompt_show"
        CANCEL_PRINT
    {% else %}
        RESPOND TYPE=echo MSG="Probe dock safety check passed"
    {% endif %}


[gcode_macro PRINT_START]
description: Inserted by slicer at start of print. Usage: PRINT_START BED_TEMP=<t> EXTRUDER0_TEMP=<t> EXTRUDER1_TEMP=<t> [EXTRUDER_TEMP=<t>] [USETOOL=<0|1|2>]
gcode:
    CLEAR_PAUSE
    # Probe check BEFORE homing: with hybrid Z homing, G28 with the probe
    # attached would run the whole probe-homing sequence just to have the
    # print cancelled immediately after.
    ASSERT_PROBE_DOCKED
    G28
    # Apply a previously saved bed mesh if one exists; otherwise print without one.
    BED_MESH_CLEAR
    {% if "default" in printer.bed_mesh.profiles %}
        BED_MESH_PROFILE LOAD=default
        M117 Loaded bed mesh 'default'
    {% else %}
        RESPOND TYPE=echo MSG="No saved 'default' bed mesh profile - printing without mesh compensation"
    {% endif %}
    # USETOOL: 0 = E1(T0) only, 1 = E2(T1) only, 2/default = both.
    # In copy/mirror IDEX modes both extruders print, so both are always heated.
    {% set USETOOL = params.USETOOL|default(2)|int %}
    {% set idex_mode = printer["gcode_macro _IDEX_MODE"].idex_mode|int %}
    {% set heat_t0 = (idex_mode != 0) or (USETOOL == 0) or (USETOOL == 2) %}
    {% set heat_t1 = (idex_mode != 0) or (USETOOL == 1) or (USETOOL == 2) %}
    {% set BED = params.BED_TEMP|default(60)|float %}
    # Per-tool temps from OrcaSlicer (nozzle_temperature_initial_layer[0]/[1]).
    # EXTRUDER_TEMP is an optional single-value fallback for both tools.
    {% set T0_TEMP = params.EXTRUDER0_TEMP|default(params.EXTRUDER_TEMP)|default(200)|float %}
    {% set T1_TEMP = params.EXTRUDER1_TEMP|default(params.EXTRUDER_TEMP)|default(200)|float %}
    # Remember each tool's print temp so standby (active - 25C) survives toolchanges.
    SET_GCODE_VARIABLE MACRO=_TOOL_TEMPS VARIABLE=t0 VALUE={T0_TEMP}
    SET_GCODE_VARIABLE MACRO=_TOOL_TEMPS VARIABLE=t1 VALUE={T1_TEMP}
    M117 Starting To Heat Extruders

    {% if heat_t0 %}M104 T0 S{T0_TEMP}{% endif %}
    {% if heat_t1 %}M104 T1 S{T1_TEMP}{% endif %}
    M140 S{BED}
    # use absolute coords
    G90
    # extruder relative mode
    M83

    M117 Waiting for bed temp...
    M190 S{BED}

    # wait only for the extruder(s) actually in use to reach temperature
    {% if heat_t0 %}
      M117 Waiting For Extruder 1 Temp to stabilize
      M109 T0 S{T0_TEMP}
    {% endif %}
    {% if heat_t1 %}
      M117 Waiting For Extruder 2 Temp to stabilize
      M109 T1 S{T1_TEMP}
    {% endif %}
    M117 Temps Reached
    _RESTORE_IDEX_MODE
    M117 Printing...


### ------------------------------ ###
# PRINT_START_PROBED — interactive variant of PRINT_START.
# Guides the user through probe attach/remove via KlipperScreen dialogs and
# runs a fresh BED_MESH_CALIBRATE before every print. Heaters start warming
# immediately (non-blocking) so temps are reached by the time the probe flow
# completes.
#
# Slicer start G-code (OrcaSlicer):
#   PRINT_START_PROBED BED_TEMP=[bed_temperature_initial_layer_single]
#                      EXTRUDER0_TEMP=[nozzle_temperature_initial_layer[0]]
#                      EXTRUDER1_TEMP=[nozzle_temperature_initial_layer[1]]
#                      USETOOL=<0|1|2>
#
# Stage flow:
#   Home → heaters on (non-blocking) → QUERY_PROBE
#     ├─ Probe attached → calibrate mesh → save → "Remove probe" dialog → PAUSE
#     └─ Probe missing  → "Attach + Level / Skip" dialog → PAUSE
#   Each dialog button calls the next stage macro; final stage → RESUME.
### ------------------------------ ###

# Retry counter for the _PSP_* dialog loop. Each failed probe-state check
# increments it; after max_retries the print is cancelled instead of
# re-showing the dialog forever (e.g. stuck/shorted probe switch).
[gcode_macro _PSP_STATE]
variable_retries: 0
variable_max_retries: 5
gcode:
    RESPOND TYPE=echo MSG="PSP retries: {printer['gcode_macro _PSP_STATE'].retries}/{printer['gcode_macro _PSP_STATE'].max_retries}"

[gcode_macro PRINT_START_PROBED]
description: Interactive print start — prompts attach/remove probe via KlipperScreen for fresh bed leveling each print.
gcode:
    CLEAR_PAUSE
    SET_GCODE_VARIABLE MACRO=_PSP_STATE VARIABLE=retries VALUE=0
    {% set USETOOL   = params.USETOOL|default(2)|int %}
    {% set BED       = params.BED_TEMP|default(60)|float %}
    {% set T0_TEMP   = params.EXTRUDER0_TEMP|default(params.EXTRUDER_TEMP)|default(200)|float %}
    {% set T1_TEMP   = params.EXTRUDER1_TEMP|default(params.EXTRUDER_TEMP)|default(200)|float %}
    # Store print temps so standby logic and _PSP_FINISH_START can read them.
    SET_GCODE_VARIABLE MACRO=_TOOL_TEMPS VARIABLE=t0 VALUE={T0_TEMP}
    SET_GCODE_VARIABLE MACRO=_TOOL_TEMPS VARIABLE=t1 VALUE={T1_TEMP}
    # Start heaters non-blocking — they warm while the user handles the probe.
    {% set idex_mode = printer["gcode_macro _IDEX_MODE"].idex_mode|int %}
    {% set heat_t0 = (idex_mode != 0) or (USETOOL == 0) or (USETOOL == 2) %}
    {% set heat_t1 = (idex_mode != 0) or (USETOOL == 1) or (USETOOL == 2) %}
    {% if heat_t0 %}M104 T0 S{T0_TEMP}{% endif %}
    {% if heat_t1 %}M104 T1 S{T1_TEMP}{% endif %}
    M140 S{BED}
    G90
    M83
    M117 Homing...
    G28
    BED_MESH_CLEAR
    # Check probe state and route to the correct dialog or immediate action.
    # Two-stage so the router reads the FRESH query (NC wiring: attached =
    # NOT triggered — see base/HC32F460.cfg).
    QUERY_PROBE
    _PSP_ROUTE_START
    # Hold the print queue. Dialog buttons call _PSP_FINISH_START → RESUME.
    PAUSE

[gcode_macro _PSP_ROUTE_START]
description: Internal — route PRINT_START_PROBED by fresh probe state
gcode:
    {% if not printer.probe.last_query %}
        # Probe already attached — level immediately, then prompt to remove.
        M117 Probe detected - leveling bed...
        BED_MESH_CALIBRATE
        BED_MESH_PROFILE SAVE=default
        _PSP_SHOW_REMOVE_PROMPT
    {% else %}
        # No probe detected — ask user to attach or skip.
        _PSP_SHOW_ATTACH_PROMPT
    {% endif %}


[gcode_macro _PSP_SHOW_ATTACH_PROMPT]
description: KlipperScreen dialog — attach probe for leveling or skip to saved mesh.
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Bed Leveling"
    RESPOND TYPE=command MSG="action:prompt_text No probe detected."
    RESPOND TYPE=command MSG="action:prompt_text Attach the probe for a fresh bed mesh, or skip to use the last saved mesh."
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Attach Probe + Level|_PSP_DO_MESH|primary"
    RESPOND TYPE=command MSG="action:prompt_button Skip (use saved mesh)|_PSP_SKIP_MESH|secondary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel Print|CANCEL_PRINT|error"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro _PSP_DO_MESH]
description: Re-verify probe attached, run BED_MESH_CALIBRATE, prompt to remove. Called by button.
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    # Re-query — state may have changed since the dialog appeared. Two-stage
    # so the check reads the FRESH query result.
    QUERY_PROBE
    _PSP_DO_MESH_CHECK

[gcode_macro _PSP_DO_MESH_CHECK]
description: Internal — mesh if probe attached, else re-show attach dialog (fresh query)
gcode:
    {% if printer.probe.last_query %}
        # Probe still not detected — re-show the attach dialog (capped retries).
        {% set psp = printer["gcode_macro _PSP_STATE"] %}
        {% if psp.retries + 1 >= psp.max_retries %}
            RESPOND TYPE=error MSG="Probe never detected after {psp.max_retries} attempts - cancelling print. Check the probe switch/wiring."
            CANCEL_PRINT
        {% else %}
            SET_GCODE_VARIABLE MACRO=_PSP_STATE VARIABLE=retries VALUE={psp.retries + 1}
            RESPOND TYPE=echo MSG="Probe not detected. Attach the probe and try again."
            _PSP_SHOW_ATTACH_PROMPT
        {% endif %}
    {% else %}
        M117 Leveling bed...
        BED_MESH_CALIBRATE
        BED_MESH_PROFILE SAVE=default
        _PSP_SHOW_REMOVE_PROMPT
    {% endif %}


[gcode_macro _PSP_SHOW_REMOVE_PROMPT]
description: KlipperScreen dialog — remove probe before print resumes.
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Remove Probe"
    RESPOND TYPE=command MSG="action:prompt_text Bed mesh complete."
    RESPOND TYPE=command MSG="action:prompt_text Remove the probe from the carriage, then tap the button below."
    RESPOND TYPE=command MSG="action:prompt_footer_button Probe Removed|_PSP_PROBE_REMOVED|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel Print|CANCEL_PRINT|error"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro _PSP_PROBE_REMOVED]
description: Verify probe removed, then finish start sequence. Called by button.
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    # Two-stage so the check reads the FRESH query result (NC wiring:
    # attached = NOT triggered — see base/HC32F460.cfg).
    QUERY_PROBE
    _PSP_PROBE_REMOVED_CHECK

[gcode_macro _PSP_PROBE_REMOVED_CHECK]
description: Internal — finish start if probe removed, else re-show remove dialog (fresh query)
gcode:
    {% if not printer.probe.last_query %}
        # Probe still detected — re-show the remove dialog (capped retries).
        {% set psp = printer["gcode_macro _PSP_STATE"] %}
        {% if psp.retries + 1 >= psp.max_retries %}
            RESPOND TYPE=error MSG="Probe still detected after {psp.max_retries} attempts - cancelling print. Check the probe switch/wiring."
            CANCEL_PRINT
        {% else %}
            SET_GCODE_VARIABLE MACRO=_PSP_STATE VARIABLE=retries VALUE={psp.retries + 1}
            RESPOND TYPE=echo MSG="Probe still detected. Remove the probe and try again."
            _PSP_SHOW_REMOVE_PROMPT
        {% endif %}
    {% else %}
        _PSP_FINISH_START
    {% endif %}


[gcode_macro _PSP_SKIP_MESH]
description: Skip leveling — load saved default mesh if available, then finish. Called by button.
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    {% if "default" in printer.bed_mesh.profiles %}
        BED_MESH_PROFILE LOAD=default
        RESPOND TYPE=echo MSG="Loaded saved 'default' bed mesh"
    {% else %}
        RESPOND TYPE=echo MSG="No saved mesh profile - printing without mesh compensation"
    {% endif %}
    _PSP_FINISH_START


[gcode_macro _PSP_FINISH_START]
description: Final PRINT_START_PROBED stage — block on temps, restore IDEX mode, resume print.
gcode:
    {% set t0 = printer["gcode_macro _TOOL_TEMPS"].t0|float %}
    {% set t1 = printer["gcode_macro _TOOL_TEMPS"].t1|float %}
    # Blocking waits — heaters have been warming since PRINT_START_PROBED began.
    M117 Waiting for bed temp...
    M190 S{printer.heater_bed.target}
    {% if t0 > 0 %}
        M117 Waiting for E1...
        M109 T0 S{t0}
    {% endif %}
    {% if t1 > 0 %}
        M117 Waiting for E2...
        M109 T1 S{t1}
    {% endif %}
    M117 Temps reached
    _RESTORE_IDEX_MODE
    M117 Printing...
    RESUME


### ------------------------------ ###
[gcode_macro END_PRINT]
gcode:
  _MAINTENANCE_TRACKER
  M117 End printing.
  RESPOND MSG="End printing"
  # Clamp the Z lift so a print ending near max height can't push the
  # gantry past position_max (would throw "Move out of range" mid-sequence).
  {% set z_lift = [[5, printer.toolhead.axis_maximum.z - printer.toolhead.position.z]|min, 0]|max %}
  G91 ; relative positioning
  G1 E-1 F300 ;retract the filament a bit before lifting the nozzle to release some of the pressure
  G1 Z{z_lift} E-2 F1000 ;move Z up a bit and extract a bit more
  m104 S0 T0 ; turn hotend heating off
  m104 S0 T1 ; turn hotend heating off
  M140 S0 ; turn hotbed heating off
  SET_GCODE_VARIABLE MACRO=_TOOL_TEMPS VARIABLE=t0 VALUE=0
  SET_GCODE_VARIABLE MACRO=_TOOL_TEMPS VARIABLE=t1 VALUE=0
  G90
  SET_DUAL_CARRIAGE CARRIAGE=0
  G28 X
  SET_DUAL_CARRIAGE CARRIAGE=1
  G28 X
  G1 Y{printer.toolhead.axis_maximum.y - 5} F6000 ; Present build plate for completed print
  M106 S255 ; turn fan on for cooling
  M84 ; steppers off
  M117 Cooling Down
  RESPOND MSG="Fans Cooling For 1 Minute"
  G4 P60000 ;keep fans on for 1 minute
  RESPOND MSG="Fans Turning Off"
  M106 S0 ; turn fan off
  M117 Print Completed

# IDEX-aware cancel cleanup. NOTE: mainsail.cfg loads AFTER base/ in
# printer.cfg, so its [gcode_macro CANCEL_PRINT] overrides ours. The cleanup
# below is therefore a SEPARATE macro wired into mainsail's cancel flow via
# variable_user_cancel_macro in _CLIENT_VARIABLE (see mainsail_client.cfg).
# It runs in BOTH paths: mainsail's CANCEL_PRINT and our fallback below.
[gcode_macro _VULCAN_CANCEL_CLEANUP]
description: IDEX cancel cleanup — lift, restore dual-material mode, park, heaters off
gcode:
  {% if "xyz" in printer.toolhead.homed_axes %}
    # Lift Z BEFORE any homing so the nozzle clears the print first
    # (clamped so we can't exceed Z travel).
    {% set z_lift = [[2, printer.toolhead.axis_maximum.z - printer.toolhead.position.z]|min, 0]|max %}
    G91
    G1 Z{z_lift} F1050
    G90
    ACTIVATE_DUAL_MATERIAL_MODE
    G28 X
    G1 Y{printer.toolhead.axis_maximum.y - 10} F6000
  {% else %}
    RESPOND TYPE=echo MSG="Axes not homed - skipping cancel park moves"
  {% endif %}
  TURN_OFF_HEATERS
  SET_GCODE_VARIABLE MACRO=_TOOL_TEMPS VARIABLE=t0 VALUE=0
  SET_GCODE_VARIABLE MACRO=_TOOL_TEMPS VARIABLE=t1 VALUE=0

# Fallback CANCEL_PRINT for installs WITHOUT mainsail.cfg (when mainsail.cfg
# is included it loads later and replaces this definition — that path runs
# _VULCAN_CANCEL_CLEANUP through the _CLIENT_VARIABLE hook instead).
[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  _VULCAN_CANCEL_CLEANUP
  CANCEL_PRINT_BASE





