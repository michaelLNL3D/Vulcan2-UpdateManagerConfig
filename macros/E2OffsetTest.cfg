############################################################
### E2 OFFSET CALIBRATION TEST PRINT ###
############################################################

[gcode_macro IDEX_OFFSET_TEST]
description: Prompt for filament, then print a 10mm E1/E2 offset cube. Usage: IDEX_OFFSET_TEST [FILAMENT=<PLA|PETG|ABS>] [BED_TEMP=<C>] [HOTEND_TEMP=<C>]
variable_size: 10
variable_layer_height: 0.2
variable_line_width: 0.62
variable_wall_count: 2
variable_travel_speed: 9000
variable_print_speed: 1200
variable_infill_speed: 1500
gcode:
    {% if params.FILAMENT is defined %}
        _IDEX_OFFSET_TEST_START {rawparams}
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_begin E2 Offset Test"
        RESPOND TYPE=command MSG="action:prompt_text Select the loaded filament to start the test."
        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button PLA|_IDEX_OFFSET_TEST_START FILAMENT=PLA|primary"
        RESPOND TYPE=command MSG="action:prompt_button PETG|_IDEX_OFFSET_TEST_START FILAMENT=PETG|secondary"
        RESPOND TYPE=command MSG="action:prompt_button ABS|_IDEX_OFFSET_TEST_START FILAMENT=ABS|secondary"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"
        RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_PROMPT_CLOSE|error"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro _IDEX_OFFSET_TEST_START]
description: Internal - start the E2 offset test after filament selection
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    {% set material = params.FILAMENT|default("PLA")|upper %}
    {% set default_bed = 60 %}
    {% set default_hotend = 205 %}
    {% if material == "PETG" %}
        {% set default_bed = 75 %}
        {% set default_hotend = 240 %}
    {% elif material == "ABS" %}
        {% set default_bed = 100 %}
        {% set default_hotend = 250 %}
    {% elif material != "PLA" %}
        { action_raise_error("IDEX_OFFSET_TEST FILAMENT must be PLA, PETG, or ABS") }
    {% endif %}

    {% set bed = params.BED_TEMP|default(default_bed)|float %}
    {% set hotend = params.HOTEND_TEMP|default(default_hotend)|float %}
    {% set cfg = printer["gcode_macro IDEX_OFFSET_TEST"] %}
    {% set size = cfg.size|float %}
    {% set layer_height = cfg.layer_height|float %}
    {% set line_width = cfg.line_width|float %}
    {% set wall_count = cfg.wall_count|int %}
    {% set travel_speed = cfg.travel_speed|float %}
    {% set print_speed = cfg.print_speed|float %}
    {% set infill_speed = cfg.infill_speed|float %}
    {% set e_per_mm = (line_width * layer_height) / 2.405 %}
    {% set center_x = (printer.toolhead.axis_minimum.x + printer.toolhead.axis_maximum.x) / 2 %}
    {% set center_y = (printer.toolhead.axis_minimum.y + printer.toolhead.axis_maximum.y) / 2 %}
    {% set outer_min = center_x - (size / 2) %}
    {% set outer_max = center_x + (size / 2) %}
    {% set outer_y_min = center_y - (size / 2) %}
    {% set outer_y_max = center_y + (size / 2) %}
    {% set infill_min = outer_min + (wall_count * line_width) %}
    {% set infill_max = outer_max - (wall_count * line_width) %}
    {% set infill_y_min = outer_y_min + (wall_count * line_width) %}
    {% set infill_y_max = outer_y_max - (wall_count * line_width) %}
    {% set infill_span = infill_max - infill_min %}
    {% set diagonal_e = (infill_span * 1.4142) * e_per_mm %}

    CLEAR_PAUSE
    _IDEX_MODE MODE=0
    HOME_IF_NOT
    ASSERT_PROBE_DOCKED
    BED_MESH_CLEAR
    {% if "default" in printer.bed_mesh.profiles %}
        BED_MESH_PROFILE LOAD=default
    {% else %}
        RESPOND TYPE=echo MSG="No saved 'default' bed mesh profile - printing E2 offset test without mesh compensation"
    {% endif %}

    SET_GCODE_VARIABLE MACRO=_TOOL_TEMPS VARIABLE=t0 VALUE={hotend}
    SET_GCODE_VARIABLE MACRO=_TOOL_TEMPS VARIABLE=t1 VALUE={hotend}
    M117 E2 offset test heating
    RESPOND TYPE=echo MSG="E2 offset test: {material} bed={bed}C hotend={hotend}C"
    M104 T0 S{hotend}
    M104 T1 S{hotend}
    M140 S{bed}
    G90
    M83
    M190 S{bed}
    M109 T0 S{hotend}
    M109 T1 S{hotend}

    CLEAR_GCODE_OFFSETS
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    _APPLY_INPUT_SHAPER CARRIAGE=0
    IDEX_OFFSET_PANEL
    T0

    M117 Printing E2 offset test
    G1 Z{layer_height} F1050
    G1 X{outer_min} Y{outer_y_min} F{travel_speed}
    {% for layer in range(1, 51) %}
        {% if layer == 1 or ((layer - 1) % 5 == 0) %}
            {% set tool = ((layer - 1) // 5) % 2 %}
            {% if tool == 0 %}
                T0
            {% else %}
                T1
            {% endif %}
        {% endif %}

        G1 Z{layer * layer_height} F1050
        {% for wall in range(wall_count) %}
            {% set inset = wall * line_width %}
            {% set xmin = outer_min + inset %}
            {% set xmax = outer_max - inset %}
            {% set ymin = outer_y_min + inset %}
            {% set ymax = outer_y_max - inset %}
            {% set x_span = xmax - xmin %}
            {% set y_span = ymax - ymin %}
            G1 X{xmin} Y{ymin} F{travel_speed}
            G1 X{xmax} Y{ymin} E{x_span * e_per_mm} F{print_speed}
            G1 X{xmax} Y{ymax} E{y_span * e_per_mm}
            G1 X{xmin} Y{ymax} E{x_span * e_per_mm}
            G1 X{xmin} Y{ymin} E{y_span * e_per_mm}
        {% endfor %}

        {% if layer % 2 == 1 %}
            G1 X{infill_min} Y{infill_y_min} F{travel_speed}
            G1 X{infill_max} Y{infill_y_max} E{diagonal_e} F{infill_speed}
            G1 X{infill_max} Y{infill_y_min} F{travel_speed}
            G1 X{infill_min} Y{infill_y_max} E{diagonal_e} F{infill_speed}
        {% else %}
            G1 X{infill_min} Y{infill_y_max} F{travel_speed}
            G1 X{infill_max} Y{infill_y_min} E{diagonal_e} F{infill_speed}
            G1 X{infill_max} Y{infill_y_max} F{travel_speed}
            G1 X{infill_min} Y{infill_y_min} E{diagonal_e} F{infill_speed}
        {% endif %}
    {% endfor %}

    END_PRINT
