[safe_z_home]
home_xy_position: 183.8, 176.4
speed: 65
# z_hop RE-ENABLED for probe-dock clearance. PROBE_PICKUP homes X only (the
# probe isn't attached yet), which takes G28's plain "G28.1 {axes}" path — that
# path does NOT do the explicit Z lift the Z-homing path does, and Z is UNHOMED
# at pickup so a macro-level G1 Z+ is impossible without [force_move]. z_hop is
# the only mechanism that lifts an unhomed Z before the carriage traverses to
# the dock, so it clears the blocker/bed on a cold, low-Z start.
# TRADE-OFF: on a Z-inclusive re-home this re-introduces a second lift alongside
# the G28 macro's explicit "G1 Z15" (the double-lift the previous 0 avoided).
# Extra Z travel only; accepted as the cost of cold-start pickup clearance.
z_hop: 15