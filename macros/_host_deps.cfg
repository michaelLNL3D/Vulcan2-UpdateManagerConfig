############################################################
### VENDORED HOST DEPENDENCIES ###
############################################################
# These macros are referenced throughout the base config (EuclidUtilities.cfg,
# pidutilities.cfg, PrintStartEnd.cfg) but were previously expected to be defined
# by the host printer.cfg. They are vendored here so `base` loads and runs
# standalone.
#
# IMPORTANT: If your host printer.cfg already defines any of these macros, either
# delete the duplicate here or do not [include] this file — Klipper takes the LAST
# definition of a duplicated macro, which may not be the one you want.

# --- Settings/holder macro -------------------------------------------------
# Holds the values consumed by other macros. EDIT the probe dock coordinates and
# PID targets to match YOUR printer before deploying — wrong dock coords can crash
# the Euclid probe into the bed/frame.
[gcode_macro LNLOS]
description: Settings holder for probe dock + PID targets (EDIT FOR YOUR PRINTER)
# Euclid probe dock pickup/dropoff position (consumed by EuclidUtilities.cfg):
variable_probe_pickup_xpos: 0       # <-- SET ME: X of probe dock
variable_probe_pickup_ypos: 0       # <-- SET ME: Y of probe dock
variable_probe_pickup_zpos: 0       # <-- SET ME: Z at which probe attaches/detaches
variable_probe_pickup_zraise: 15    # safe Z travel height before/after dock moves
# PID calibration targets (consumed by pidutilities.cfg):
variable_extruder_pid_target: 240
variable_bed_pid_target: 60
gcode:
    # Holder macro — no action. Values are read via printer["gcode_macro LNLOS"].
    RESPOND TYPE=echo MSG="LNLOS settings holder (no-op)"

# --- Home only if not already homed ----------------------------------------
[gcode_macro HOME_IF_NOT]
description: Home all axes only if they are not already homed
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

# --- Euclid probe attach / detach state ------------------------------------
# PROBE_PICKUP / PROBE_DROPOFF perform the physical dock moves; these macros
# record/verify probe state. Adjust if your host uses a different mechanism.
[gcode_macro PROBEON]
description: Mark Euclid probe as attached and verify
gcode:
    QUERY_PROBE
    RESPOND TYPE=echo MSG="Probe attached"

[gcode_macro PROBEOFF]
description: Mark Euclid probe as detached and verify
gcode:
    QUERY_PROBE
    RESPOND TYPE=echo MSG="Probe stowed"

# --- Maintenance tracker stub ----------------------------------------------
# Called by END_PRINT. No-op stub so prints complete without error; replace with
# a real print/hour counter if desired.
[gcode_macro _MAINTENANCE_TRACKER]
description: No-op maintenance tracker stub (called by END_PRINT)
gcode:
    RESPOND TYPE=echo MSG="Maintenance tracker (stub)"
