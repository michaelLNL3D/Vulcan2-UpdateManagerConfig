############################################################
### VENDORED HOST DEPENDENCIES ###
############################################################
# These macros are referenced throughout the base config (EuclidUtilities.cfg,
# pidutilities.cfg, PrintStartEnd.cfg) but were previously expected to be defined
# by the host printer.cfg. They are vendored here so `base` loads and runs
# standalone.
#
# IMPORTANT: If your host printer.cfg already defines any of these macros, either
# delete the duplicate here or do not [include] this file — Klipper takes the LAST
# definition of a duplicated macro, which may not be the one you want.

# --- Settings/holder macro -------------------------------------------------
# Holds the values consumed by other macros. EDIT the probe dock coordinates and
# PID targets to match YOUR printer before deploying — wrong dock coords can crash
# the Euclid probe into the bed/frame.
[gcode_macro LNLOS]
description: Settings holder for probe dock + PID targets (EDIT FOR YOUR PRINTER)
# Euclid/Klicky home-dock geometry (consumed by EuclidUtilities.cfg).
# The dock rides on the moving gantry at the E1 (carriage 0) X endstop, so
# PICKUP = home X. Sense/release are +X OFFSETS from that endstop (read live
# from [stepper_x] position_endstop) so they track the config automatically.
# Y is irrelevant: Y bed-slinger; the dock/blocker sit off the bed's left edge.
variable_probe_dock_sense_xoffset: 28   # +X from endstop to sense the blocker (-> X=-26)
variable_probe_dock_release: 50         # +X from endstop to strip the probe   (-> X=-4)
variable_probe_dock_zoffset: 0          # optional engagement-Z fine-tune (0 = use sensed height)
variable_probe_pickup_zraise: 15        # safe Z travel height before/after dock moves
# PID calibration targets (consumed by pidutilities.cfg):
variable_extruder_pid_target: 240
variable_bed_pid_target: 60
# Standby temperature drop in °C for the idle nozzle during dual-material
# prints (copied into _TOOL_TEMPS at startup — override from local/ by
# redefining LNLOS or via SET_GCODE_VARIABLE MACRO=LNLOS):
variable_standby_delta: 25
gcode:
    # Holder macro — no action. Values are read via printer["gcode_macro LNLOS"].
    RESPOND TYPE=echo MSG="LNLOS settings holder (no-op)"

# --- Safety stop helper ------------------------------------------------------
# One-call safety stop, visible EVERYWHERE:
#   - Mainsail console: RESPOND TYPE=error with the full explanation
#   - KlipperScreen:    action:prompt popup with the full explanation
#                       (RESPOND TYPE=error alone is console-only — the
#                       touchscreen user never sees it)
#   - Halts the stream: raises a short intentional error tag
# Usage: _SAFETY_STOP MSG="<short tag>" DETAIL="<full explanation>"
# (Macro-style commands only accept KEY=VALUE params; quoted values ARE
# supported. The raise lives in _SAFETY_RAISE because action_raise_error
# fires at template-render time — raising here would suppress the messages,
# since templates render before any command executes.)
[gcode_macro _SAFETY_STOP]
description: Internal — explain (console + touchscreen) then halt the command stream
gcode:
    {% set msg = params.MSG|default("SAFETY STOP") %}
    {% set detail = params.DETAIL|default(msg) %}
    RESPOND TYPE=error MSG="SAFETY STOP: {detail}"
    RESPOND TYPE=command MSG="action:prompt_begin Safety Stop"
    RESPOND TYPE=command MSG="action:prompt_text {detail}"
    RESPOND TYPE=command MSG="action:prompt_footer_button OK|_PROMPT_CLOSE|error"
    RESPOND TYPE=command MSG="action:prompt_show"
    _SAFETY_RAISE MSG="{msg}"

[gcode_macro _SAFETY_RAISE]
description: Internal — raise the halting error (renders after the messages were sent)
gcode:
    {action_raise_error(params.MSG|default("SAFETY STOP"))}

# --- Home only if not already homed ----------------------------------------
[gcode_macro HOME_IF_NOT]
description: Home all axes only if they are not already homed
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

# --- Euclid probe attach / detach state ------------------------------------
# PROBE_PICKUP / PROBE_DROPOFF perform the physical dock moves; these macros
# VERIFY the result electrically. NC wiring (see base/HC32F460.cfg):
#   attached idle = open (last_query False) | detached/pressed = TRIGGERED (True)
# Two-stage pattern: the check lives in _PROBE_VERIFY because a macro's
# template renders before its commands run — reading last_query in the same
# macro as QUERY_PROBE would see the previous query's value.
[gcode_macro PROBEON]
description: Verify Euclid probe is attached after pickup
gcode:
    QUERY_PROBE
    _PROBE_VERIFY EXPECT=attached

[gcode_macro PROBEOFF]
description: Verify Euclid probe is docked after dropoff
gcode:
    QUERY_PROBE
    _PROBE_VERIFY EXPECT=docked

[gcode_macro _PROBE_VERIFY]
description: Check fresh QUERY_PROBE result against expectation. Usage: _PROBE_VERIFY EXPECT=<attached|docked>
gcode:
    {% set expect = params.EXPECT|default("attached") %}
    {% if expect == "attached" and printer.probe.last_query %}
        _SAFETY_STOP MSG="PROBE GUARD: pickup not verified" DETAIL="Probe pickup FAILED - probe still reads detached/triggered. Check the dock and LNLOS dock coordinates."
    {% elif expect == "docked" and not printer.probe.last_query %}
        _SAFETY_STOP MSG="PROBE GUARD: dropoff not verified" DETAIL="Probe dropoff FAILED - probe still reads attached. Check the dock and LNLOS dock coordinates."
    {% elif expect == "attached" %}
        RESPOND TYPE=echo MSG="Probe attached (verified)"
    {% else %}
        RESPOND TYPE=echo MSG="Probe docked (verified)"
    {% endif %}

# --- Maintenance tracker ----------------------------------------------------
# Called by END_PRINT. Accumulates lifetime print count and print hours into
# [save_variables] (variables.cfg) so they survive restarts. Query with
# MAINTENANCE_STATUS.
[gcode_macro _MAINTENANCE_TRACKER]
description: Accumulate lifetime print count and hours (called by END_PRINT)
gcode:
    {% set saved = printer.save_variables.variables %}
    {% set prints = saved.maint_total_prints|default(0)|int + 1 %}
    {% set hours = saved.maint_print_hours|default(0)|float + (printer.print_stats.total_duration / 3600)|float %}
    SAVE_VARIABLE VARIABLE=maint_total_prints VALUE={prints}
    SAVE_VARIABLE VARIABLE=maint_print_hours VALUE={hours|round(2)}
    RESPOND TYPE=echo MSG="Lifetime: {prints} prints, {hours|round(1)}h print time"

[gcode_macro MAINTENANCE_STATUS]
description: Report lifetime print count and accumulated print hours
gcode:
    {% set saved = printer.save_variables.variables %}
    RESPOND TYPE=echo MSG="Lifetime prints: {saved.maint_total_prints|default(0)} | Print hours: {saved.maint_print_hours|default(0)|float|round(1)}h"
