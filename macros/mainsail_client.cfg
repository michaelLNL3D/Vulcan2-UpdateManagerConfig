############################################################
### MAINSAIL CLIENT MACRO CONFIGURATION ###
############################################################
# printer.cfg includes mainsail.cfg LAST, so mainsail's PAUSE / RESUME /
# CANCEL_PRINT definitions override anything defined in base/. Rather than
# fight the include order, this file configures mainsail's client macros via
# its supported _CLIENT_VARIABLE hook:
#
#   - user_cancel_macro → _VULCAN_CANCEL_CLEANUP (PrintStartEnd.cfg): the
#     IDEX-aware cancel sequence (safe Z lift, restore dual-material mode,
#     home X on both carriages, present bed, heaters off) runs inside
#     mainsail's CANCEL_PRINT.
#   - park_at_cancel is left False because _VULCAN_CANCEL_CLEANUP does its
#     own IDEX-correct parking (mainsail's single-toolhead park doesn't know
#     about the second carriage).
#
# NOTE: requires a mainsail-config version with user_*_macro support
# (2023+). On older versions the unknown variables are simply ignored and
# the fallback CANCEL_PRINT in PrintStartEnd.cfg still applies.
#
# Customers can override any of these from local/*.cfg — local/ loads after
# base/macros/, so a local _CLIENT_VARIABLE wins over this one.

[gcode_macro _CLIENT_VARIABLE]
variable_user_cancel_macro: "_VULCAN_CANCEL_CLEANUP"
variable_park_at_cancel: False
# Park position used by mainsail's PAUSE (front-left, clear of both
# carriages' park zones; Z hop 5mm):
variable_custom_park_dz: 5.0
variable_speed_z_hop: 15
variable_speed_move: 100
# Use the firmware retraction already configured in vulcan2.cfg for
# pause/cancel retracts instead of raw E moves:
variable_use_fw_retract: True
gcode:
