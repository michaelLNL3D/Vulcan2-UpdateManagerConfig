############################################################
### FAST M109 — RETURN AT TARGET, SKIP PID SETTLE TAIL ###
############################################################
# Stock M109 uses the PID control's check_busy, which blocks until the hotend is
# BOTH within PID_SETTLE_DELTA (1 C) of target AND the slope is under
# PID_SETTLE_SLOPE (0.1 C/s). After a fast ramp the slope stays high for ~15-20s,
# so M109 keeps waiting AFTER the temperature first reaches target. On an IDEX
# print that "settle" dwell hits every heat-wait: PRINT_START, toolchange, the
# runout swap, and load/unload.
#
# This override waits only until the addressed hotend first REACHES target via
# TEMPERATURE_WAIT MINIMUM (instantaneous temp, no slope test), so it returns as
# soon as temp >= target. The PID still holds temperature throughout the print,
# so steady-state accuracy is unchanged — we only skip the wait.
#
# IDEX-aware: M109 is called here as `M109 T0/T1 S...` (PRINT_START, idex T0/T1,
# _RUNOUT_SWITCH_AND_RESUME) or bare `M109 S...` (LOAD/UNLOAD). Wait on the
# matching heater: T0 -> extruder, T1 -> extruder1, else the active extruder.
#
# Limitation (intentional): MINIMUM-only means an M109 to a LOWER temp will not
# block to cool down. This config never cooldown-waits via M109 (END_PRINT uses
# M104 S0), so this is safe here.

[gcode_macro M109]
rename_existing: M99109
description: Wait only until the hotend first reaches target (skips the PID settle tail).
gcode:
    {% set s = params.S|float %}
    # Map the addressed tool to its heater; fall back to the active extruder.
    {% if params.T is defined %}
      {% set sensor = "extruder" if params.T|int == 0 else "extruder1" %}
    {% else %}
      {% set sensor = printer.toolhead.extruder %}
    {% endif %}
    # Set the target — pass the original T/S params through to the built-in M104.
    M104 {rawparams}
    {% if s != 0 and sensor %}
      TEMPERATURE_WAIT SENSOR={sensor} MINIMUM={s}
    {% endif %}
