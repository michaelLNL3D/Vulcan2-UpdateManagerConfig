############################################################
### SUPPORT / CONTACT INFO ###
############################################################
# Customer-facing support card: touchscreen dialog (KlipperScreen action
# prompt) + console echo (Mainsail). Launched from the KlipperScreen main
# menu "Support" entry (base/Klipperscreen_LNL.conf) and the Mainsail
# Utilities macro group (base/scripts/setup_mainsail_macro_groups.py).
#
# Live data: lifetime print count / hours from the maintenance tracker
# (_MAINTENANCE_TRACKER in _host_deps.cfg, persisted via save_variables).
# Software versions are intentionally NOT shown - Klipper macro templates
# cannot access them; customers can read versions in KlipperScreen - System.

[gcode_macro SUPPORT_INFO]
description: Show LNL3D support and contact info (touchscreen dialog + console)
# EDIT THESE for your business (values must stay quoted):
variable_company: "LNL3D"
variable_model: "Vulcan2 IDEX"
variable_email: "support@lnl3d.example"     # <-- SET ME
variable_phone: "(555) 555-5555"            # <-- SET ME
variable_website: "lnl3d.example/support"   # <-- SET ME
gcode:
    {% set s = printer["gcode_macro SUPPORT_INFO"] %}
    {% set saved = printer.save_variables.variables %}
    {% set prints = saved.maint_total_prints|default(0) %}
    {% set hours = saved.maint_print_hours|default(0)|float|round(1) %}
    RESPOND TYPE=command MSG="action:prompt_begin {s.company} Support"
    RESPOND TYPE=command MSG="action:prompt_text Model: {s.model}"
    RESPOND TYPE=command MSG="action:prompt_text Email: {s.email}"
    RESPOND TYPE=command MSG="action:prompt_text Phone: {s.phone}"
    RESPOND TYPE=command MSG="action:prompt_text Web: {s.website}"
    RESPOND TYPE=command MSG="action:prompt_text Lifetime: {prints} prints / {hours} h"
    RESPOND TYPE=command MSG="action:prompt_footer_button Close|_PROMPT_CLOSE|primary"
    RESPOND TYPE=command MSG="action:prompt_show"
    # Console copy so Mainsail users see it inline:
    RESPOND TYPE=echo MSG="{s.company} support - {s.email} | {s.phone} | {s.website} | {prints} prints / {hours}h"
