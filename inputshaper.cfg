############################################################
### INPUT SHAPER / RESONANCE COMPENSATION ###
############################################################
# Input shaper cancels ringing/ghosting at higher accelerations. On an IDEX
# machine each X carriage has its own resonance frequency, so the shaper is
# re-applied per carriage on toolchange (see _APPLY_INPUT_SHAPER below).
#
# ── CALIBRATION PROCEDURE (ADXL345 accelerometer) ──────────────────────────
# 1. Mount the ADXL345 on the E1 toolhead, wire to the host (CB1) SPI,
#    then uncomment [adxl345] and [resonance_tester] below and RESTART.
# 2. Run:  SHAPER_CALIBRATE AXIS=X   then  SHAPER_CALIBRATE AXIS=Y
#    Note the recommended shaper type + frequency for X (carriage 0) and Y.
# 3. Move the ADXL to the E2 toolhead. Run:
#       SET_DUAL_CARRIAGE CARRIAGE=1
#       SHAPER_CALIBRATE AXIS=X
#    Note the recommended shaper/freq for the second carriage.
# 4. Fill the measured values into the [input_shaper] section and the
#    _IS_SETTINGS holder below, uncomment [input_shaper], re-comment the
#    ADXL sections, remove the accelerometer, and RESTART.
# ────────────────────────────────────────────────────────────────────────────

# --- Accelerometer (uncomment while calibrating only) -----------------------
#[adxl345]
#cs_pin: CB1:None
#spi_bus: spidev1.1
#axes_map: x,y,z

#[resonance_tester]
#accel_chip: adxl345
#probe_points:
#    150, 150, 20   # bed center

# --- Shaper (uncomment + fill in after calibrating) --------------------------
# Reference values from a previous measurement (re-verify before enabling):
#[input_shaper]
#shaper_freq_x: 41.6
#shaper_type_x: mzv
#shaper_freq_y: 47.4
#shaper_type_y: 2hump_ei

# --- Per-carriage shaper settings holder -------------------------------------
# X resonance differs between the two carriages; Y is shared (one gantry).
# Fill in from the calibration procedure above.
[gcode_macro _IS_SETTINGS]
description: Per-carriage input shaper settings holder (no-op)
variable_c0_freq_x: 41.6
variable_c0_type_x: "mzv"
variable_c1_freq_x: 41.6
variable_c1_type_x: "mzv"
gcode:
    RESPOND TYPE=echo MSG="Input shaper settings holder (no-op)"

# --- Apply the correct X shaper for a carriage --------------------------------
# Call with CARRIAGE=<0|1> after SET_DUAL_CARRIAGE (e.g. from T0/T1).
# No-ops safely while [input_shaper] is commented out, so it is always safe
# for macros to call.
[gcode_macro _APPLY_INPUT_SHAPER]
description: Apply per-carriage X input shaper. Usage: _APPLY_INPUT_SHAPER CARRIAGE=<0|1>
gcode:
    {% if 'input_shaper' in printer.configfile.settings %}
        {% set c = params.CARRIAGE|default(0)|int %}
        {% set s = printer["gcode_macro _IS_SETTINGS"] %}
        {% if c == 1 %}
            SET_INPUT_SHAPER SHAPER_TYPE_X={s.c1_type_x} SHAPER_FREQ_X={s.c1_freq_x}
        {% else %}
            SET_INPUT_SHAPER SHAPER_TYPE_X={s.c0_type_x} SHAPER_FREQ_X={s.c0_freq_x}
        {% endif %}
    {% endif %}
