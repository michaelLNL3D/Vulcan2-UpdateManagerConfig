# --- Macros panel curation --------------------------------------------------
# Hides slicer-facing / prompt-helper macros from KlipperScreen's Macros panel
# so it shows only the curated set (mirrors the Mainsail dashboard groups —
# see scripts/setup_mainsail_macro_groups.py). Macros stay fully callable;
# this only removes their buttons. Keys are lowercase; absent keys = shown.
# Printer name is "Printer" (KlipperScreen default when no [printer] section).
[displayed_macros Printer]
assert_probe_docked: False
cancel_print: False
clear_gcode_offsets: False
copy_offset_minus01: False
copy_offset_plus01: False
end_print: False
g28: False
home_if_not: False
mirror_offset_minus01: False
mirror_offset_plus01: False
nudge_copy_offset: False
nudge_idex_offset: False
nudge_mirror_offset: False
park_extruder: False
park_extruder1: False
pause: False
print_start: False
print_start_probed: False
probeoff: False
probeon: False
resume: False
set_copy_offset: False
set_idex_tool_offset: False
set_mirror_offset: False
set_pause_at_layer: False
set_pause_next_layer: False
t0: False
t1: False