# --- E2 tool-offset live adjustment -------------------------------------
# Each button live-shifts the print (when E2 is active) AND persists the new
# value via NUDGE_IDEX_OFFSET. Safe to use during a test print to dial in
# registration / first-layer height, then it's remembered for every T1.
[menu __main IDEX offsets]
name: E2 Offsets

[menu __main IDEX offsets show]
name: Show Offsets
method: printer.gcode.script
params: {"script":"SHOW_IDEX_OFFSETS"}

[menu __main IDEX offsets xplus]
name: X +0.1
method: printer.gcode.script
params: {"script":"NUDGE_IDEX_OFFSET X=0.1"}

[menu __main IDEX offsets xminus]
name: X -0.1
method: printer.gcode.script
params: {"script":"NUDGE_IDEX_OFFSET X=-0.1"}

